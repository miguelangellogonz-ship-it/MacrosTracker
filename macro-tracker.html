              <input type="number" step="0.25" min="0.25" value={ingredientPickerQty} onChange={(e) => setIngredientPickerQty(e.target.value)} className="flex-1 text-center px-3 py-2 rounded-lg border border-stone-200 text-lg font-semibold focus:outline-none focus:border-stone-400" />
              <button onClick={() => setIngredientPickerQty(q => (parseFloat(q) || 0) + 0.25)} className="w-10 h-10 rounded-lg bg-stone-100 text-stone-700 text-xl font-bold hover:bg-stone-200 active:bg-stone-300 flex-shrink-0">+</button>
            </div>
            <div className="bg-stone-50 rounded-lg p-3 mb-4">
              <p className="text-xs text-stone-500 mb-1">Will add:</p>
              <p className="text-lg font-bold text-stone-900 mb-0.5">{Math.round(ingredientPickerModal.cal * (parseFloat(ingredientPickerQty) || 0))} cal</p>
              <p className="text-xs text-stone-500">{Math.round(ingredientPickerModal.protein * (parseFloat(ingredientPickerQty) || 0) * 10) / 10}g protein · {Math.round((ingredientPickerModal.carbs || 0) * (parseFloat(ingredientPickerQty) || 0) * 10) / 10}g carbs · {Math.round((ingredientPickerModal.fat || 0) * (parseFloat(ingredientPickerQty) || 0) * 10) / 10}g fat</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setIngredientPickerModal(null)} className="flex-1 bg-stone-100 text-stone-700 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200">Cancel</button>
              <button onClick={() => { const qty = parseFloat(ingredientPickerQty) || 0; if (qty > 0) addIngredientToBuilder(ingredientPickerModal, qty); setIngredientPickerModal(null); }} disabled={(parseFloat(ingredientPickerQty) || 0) <= 0} className="flex-1 bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-stone-800 disabled:bg-stone-300">Add Ingredient</button>
            </div>
          </div>
        </div>
      )}

      {/* ✅ Meal Scale Modal — now shows notes */}
      {mealScaleModal && (
        <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-50 p-4" onClick={() => setMealScaleModal(null)}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-lg font-bold text-stone-900 mb-1">{mealScaleModal.name}</h3>
            <p className="text-xs text-stone-500 mb-1">Base: {mealScaleModal.cal} cal · {mealScaleModal.protein}P · {mealScaleModal.carbs}C · {mealScaleModal.fat}F</p>
            {/* ✅ Notes shown in modal before logging */}
            {mealScaleModal.notes && (
              <p className="text-xs text-stone-500 italic mb-3 leading-relaxed border-t border-stone-100 pt-2">{mealScaleModal.notes}</p>
            )}
            {mealScaleModal.ingredients && mealScaleModal.ingredients.length > 0 && (
              <p className="text-[10px] text-stone-400 mb-3 leading-relaxed">
                {mealScaleModal.ingredients.map(i => `${i.qty} ${i.unitLabel} ${i.name.toLowerCase()}`).join(" · ")}
              </p>
            )}
            <label className="text-sm font-medium text-stone-700 mb-2 block">Portion (1× = full meal)</label>
            <div className="flex items-center gap-3 mb-4">
              <button onClick={() => setMealScale(Math.max(0, (parseFloat(mealScale) || 0) - 0.25))} className="w-10 h-10 rounded-lg bg-stone-100 text-stone-700 text-xl font-bold hover:bg-stone-200">−</button>
              <input type="number" step="0.25" min="0" value={mealScale} onChange={(e) => setMealScale(e.target.value)} className="flex-1 text-center px-3 py-2 rounded-lg border border-stone-200 text-lg font-semibold focus:outline-none focus:border-stone-400" />
              <button onClick={() => setMealScale((parseFloat(mealScale) || 0) + 0.25)} className="w-10 h-10 rounded-lg bg-stone-100 text-stone-700 text-xl font-bold hover:bg-stone-200">+</button>
            </div>
            <div className="bg-stone-50 rounded-lg p-3 mb-4">
              <p className="text-sm text-stone-600 mb-1">Will log:</p>
              <p className="text-lg font-bold text-stone-900 mb-1">{Math.round(mealScaleModal.cal * (parseFloat(mealScale) || 0))} cal</p>
              <p className="text-xs text-stone-500">{Math.round(mealScaleModal.protein * (parseFloat(mealScale) || 0) * 10) / 10}g protein · {Math.round(mealScaleModal.carbs * (parseFloat(mealScale) || 0) * 10) / 10}g carbs · {Math.round(mealScaleModal.fat * (parseFloat(mealScale) || 0) * 10) / 10}g fat</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setMealScaleModal(null)} className="flex-1 bg-stone-100 text-stone-700 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200">Cancel</button>
              <button onClick={confirmMealLog} className="flex-1 bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-stone-800">Add to Log</button>
            </div>
          </div>
        </div>
      )}

      {editMealModal && (
        <div className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-4" onClick={() => { setEditMealModal(null); setEditMealShowPicker(false); setEditMealCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" }); }}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-md shadow-xl max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>

            <div className="mb-3">
              <label className="text-xs font-medium text-stone-600 mb-1 block">Meal name</label>
              <input
                type="text"
                value={editMealModal.name}
                onChange={(e) => setEditMealModal({ ...editMealModal, name: e.target.value })}
                className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400"
              />
            </div>

            {/* Ingredient-based meal — show editable qtys, macros auto-recalculate */}
            {editMealModal.ingredients && !editMealModal.isOneShot ? (
              <div className="mb-3">

                  {editMealModal.ingredients.map((ing, idx) => {
                    const source = [...PRESET_MEALS, ...customPresets].find(p => p.name === ing.name);

                    const perUnitCal = ing._cal !== undefined ? ing._cal : (source ? source.cal : null);
                    const perUnitProtein = ing._protein !== undefined ? ing._protein : (source ? source.protein : null);
                    const ingCal = perUnitCal !== null ? Math.round(perUnitCal * qty) : "—";
                    const ingProtein = perUnitProtein !== null ? Math.round(perUnitProtein * qty * 10) / 10 : "—";
                    return (
                      <div key={idx} className="bg-stone-50 rounded-lg px-3 py-2">
                        <div className="flex items-center justify-between mb-1">
                          <p className="text-sm text-stone-800 font-medium truncate mr-2">{ing.name}</p>
                          <div className="flex items-center gap-1 flex-shrink-0">
                            <button
                              onClick={() => {
                                const newQty = Math.max(0.25, Math.round(((parseFloat(ing.qty) || 0) - 0.25) * 100) / 100);
                                const updated = editMealModal.ingredients.map((i, j) => j === idx ? { ...i, qty: String(newQty) } : i);
                                setEditMealModal({ ...editMealModal, ingredients: updated });
                              }}
                              className="w-6 h-6 rounded bg-stone-200 text-stone-700 text-sm font-bold hover:bg-stone-300 flex items-center justify-center"
                            >−</button>
                            <input
                              type="number"
                              step="0.25"
                              min="0.25"
                              value={ing.qty}
                              onChange={(e) => {
                                const updated = editMealModal.ingredients.map((i, j) => j === idx ? { ...i, qty: e.target.value } : i);
                                setEditMealModal({ ...editMealModal, ingredients: updated });
                              }}
                              className="w-14 text-center px-1 py-1 rounded border border-stone-200 text-sm font-semibold focus:outline-none focus:border-stone-400"
                            />
                            <button
                              onClick={() => {
                                const newQty = Math.round(((parseFloat(ing.qty) || 0) + 0.25) * 100) / 100;
                                const updated = editMealModal.ingredients.map((i, j) => j === idx ? { ...i, qty: String(newQty) } : i);
                                setEditMealModal({ ...editMealModal, ingredients: updated });
                              }}
                              className="w-6 h-6 rounded bg-stone-200 text-stone-700 text-sm font-bold hover:bg-stone-300 flex items-center justify-center"
                            >+</button>
                            <span className="text-xs text-stone-500 mx-1">{ing.unitLabel}</span>
                            {/* Remove ingredient button */}
                            <button
                              onClick={() => {
                                const updated = editMealModal.ingredients.filter((_, j) => j !== idx);
                                setEditMealModal({ ...editMealModal, ingredients: updated });
                              }}
                              className="w-6 h-6 rounded text-stone-400 hover:text-red-500 hover:bg-red-50 flex items-center justify-center ml-0.5"
                              title="Remove ingredient"
                            >
                              <Trash2 className="w-3.5 h-3.5" />
                            </button>
                          </div>
                        </div>
                        <p className="text-[10px] text-stone-400">{ingCal} cal · {ingProtein}P</p>
                      </div>
                    );
                  })}
                </div>

                {/* Add ingredient picker */}
                <div className="mt-2">
                  {!editMealShowPicker && (
                    <button
                      onClick={() => setEditMealShowPicker("list")}
                      className="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg border border-dashed border-stone-300 text-xs font-medium text-stone-500 hover:border-stone-400 hover:text-stone-700 hover:bg-stone-50"
                    >
                      <Plus className="w-3.5 h-3.5" /> Add Ingredient
                    </button>
                  )}

                  {editMealShowPicker === "list" && (
                    <div className="border border-stone-200 rounded-lg overflow-hidden">
                      <div className="flex items-center justify-between px-3 py-2 bg-stone-50 border-b border-stone-200">
                        <p className="text-xs font-semibold text-stone-600">Quick Adds</p>
                        <button onClick={() => setEditMealShowPicker(false)} className="text-xs text-stone-400 hover:text-stone-600">✕ Close</button>
                      </div>
                      <div className="max-h-44 overflow-y-auto">
                        {[...PRESET_MEALS, ...customPresets].map((preset, i) => (
                          <button
                            key={preset.id || i}
                            onClick={() => {
                              const existingIdx = editMealModal.ingredients.findIndex(ing => ing.name === preset.name);
                              let updatedIngredients;
                              if (existingIdx >= 0) {
                                updatedIngredients = editMealModal.ingredients.map((ing, j) =>
                                  j === existingIdx
                                    ? { ...ing, qty: String(Math.round(((parseFloat(ing.qty) || 0) + preset.defaultQty) * 100) / 100) }
                                    : ing
                                );
                              } else {
                                updatedIngredients = [
                                  ...editMealModal.ingredients,
                                  { name: preset.name, unitLabel: preset.unitLabel, qty: String(preset.defaultQty) },
                                ];
                              }
                              setEditMealModal({ ...editMealModal, ingredients: updatedIngredients });
                              setEditMealShowPicker(false);
                            }}
                            className="w-full text-left px-3 py-2 text-xs hover:bg-stone-50 border-b border-stone-100 last:border-0 flex items-center justify-between"
                          >
                            <span className="text-stone-700">{preset.defaultQty} {preset.unitLabel} {preset.name.toLowerCase()}</span>
                            <Plus className="w-3 h-3 text-stone-400 flex-shrink-0" />
                          </button>
                        ))}
                        {/* Custom ingredient entry option */}
                        <button
                          onClick={() => setEditMealShowPicker("custom")}
                          className="w-full text-left px-3 py-2 text-xs hover:bg-stone-50 flex items-center justify-between text-stone-500 italic"
                        >
                          <span>+ Enter custom ingredient…</span>
                          <Plus className="w-3 h-3 text-stone-400 flex-shrink-0" />
                        </button>
                      </div>
                    </div>
                  )}

                  {editMealShowPicker === "custom" && (
                    <div className="border border-stone-200 rounded-lg overflow-hidden">
                      <div className="flex items-center justify-between px-3 py-2 bg-stone-50 border-b border-stone-200">
                        <p className="text-xs font-semibold text-stone-600">Custom Ingredient</p>
                        <button onClick={() => setEditMealShowPicker("list")} className="text-xs text-stone-400 hover:text-stone-600">← Back</button>
                      </div>
                      <div className="p-3 space-y-2">
                        <input
                          type="text"
                          placeholder="Name (e.g., Greek yogurt)"
                          value={editMealCustomIng.name}
                          onChange={(e) => setEditMealCustomIng({ ...editMealCustomIng, name: e.target.value })}
                          className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400"
                        />
                        <div className="flex gap-2">
                          <input type="number" placeholder="Qty" value={editMealCustomIng.qty} onChange={(e) => setEditMealCustomIng({ ...editMealCustomIng, qty: e.target.value })} className="w-16 px-2 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                          <select value={editMealCustomIng.unit} onChange={(e) => setEditMealCustomIng({ ...editMealCustomIng, unit: e.target.value })} className="flex-1 px-2 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400 bg-white">
                            <option value="oz">oz</option>
                            <option value="g">g</option>
                            <option value="cup">cup</option>
                            <option value="tbsp">tbsp</option>
                            <option value="tsp">tsp</option>
                            <option value="piece">piece</option>
                            <option value="slice">slice</option>
                            <option value="serving">serving</option>
                          </select>
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          <input type="number" placeholder="Calories" value={editMealCustomIng.cal} onChange={(e) => setEditMealCustomIng({ ...editMealCustomIng, cal: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                          <input type="number" placeholder="Protein (g)" value={editMealCustomIng.protein} onChange={(e) => setEditMealCustomIng({ ...editMealCustomIng, protein: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                          <input type="number" placeholder="Carbs (g)" value={editMealCustomIng.carbs} onChange={(e) => setEditMealCustomIng({ ...editMealCustomIng, carbs: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                          <input type="number" placeholder="Fat (g)" value={editMealCustomIng.fat} onChange={(e) => setEditMealCustomIng({ ...editMealCustomIng, fat: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                        </div>
                        <button
                          onClick={() => {
                            if (!editMealCustomIng.name || !editMealCustomIng.cal) return;
                            const qty = parseFloat(editMealCustomIng.qty) || 1;
                            const unit = editMealCustomIng.unit;
                            const unitLabel = unit.endsWith("s") || unit === "oz" ? unit : `${unit}s`;
                            const cal = parseFloat(editMealCustomIng.cal) || 0;
                            const protein = parseFloat(editMealCustomIng.protein) || 0;
                            const carbs = parseFloat(editMealCustomIng.carbs) || 0;
                            const fat = parseFloat(editMealCustomIng.fat) || 0;
                            // Store as a "virtual" ingredient — since it has no preset source,
                            // we embed the per-unit macros directly on the ingredient object
                            const newIng = {
                              name: editMealCustomIng.name,
                              unitLabel,
                              qty: String(qty),
                              // inline macros for custom ingredients (used in recalc)
                              _cal: cal / qty,
                              _protein: protein / qty,
                              _carbs: carbs / qty,
                              _fat: fat / qty,
                            };
                            setEditMealModal({ ...editMealModal, ingredients: [...editMealModal.ingredients, newIng] });
                            setEditMealCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" });
                            setEditMealShowPicker(false);
                          }}
                          disabled={!editMealCustomIng.name || !editMealCustomIng.cal}
                          className="w-full bg-stone-900 text-white rounded-lg py-2 text-xs font-medium hover:bg-stone-800 disabled:bg-stone-300"
                        >
                          Add to Meal
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                {/* Live total preview */}
                {(() => {
                  const allPoss = [...PRESET_MEALS, ...customPresets];
                  let previewCal = 0, previewProtein = 0, previewCarbs = 0, previewFat = 0;
                  editMealModal.ingredients.forEach(ing => {
                    const qty = parseFloat(ing.qty) || 0;
                    if (ing._cal !== undefined) {
                      previewCal += ing._cal * qty;
                      previewProtein += ing._protein * qty;
                      previewCarbs += (ing._carbs || 0) * qty;
                      previewFat += (ing._fat || 0) * qty;
                    } else {
                      const src = allPoss.find(p => p.name === ing.name);
                      if (src) {
                        previewCal += src.cal * qty;
                        previewProtein += src.protein * qty;
                        previewCarbs += (src.carbs || 0) * qty;
                        previewFat += (src.fat || 0) * qty;
                      }
                    }
                  });
                  return (
                    <div className="mt-2 bg-stone-900 rounded-lg px-3 py-2 text-white">
                      <p className="text-xs text-stone-400 mb-0.5">New total</p>
                      <p className="text-sm font-semibold">{Math.round(previewCal)} cal · {Math.round(previewProtein * 10) / 10}P · {Math.round(previewCarbs * 10) / 10}C · {Math.round(previewFat * 10) / 10}F</p>
                    </div>
                  );
                })()}
              </div>
            ) : (
              /* One-shot / manual meal — edit macros directly */
              <div className="mb-3 space-y-2">
                <p className="text-xs font-medium text-stone-600 mb-1">Macros</p>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className="text-[10px] text-stone-500 mb-0.5 block">Calories</label>
                    <input type="number" value={editMealModal.cal} onChange={(e) => setEditMealModal({ ...editMealModal, cal: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                  </div>
                  <div className="flex-1">
                    <label className="text-[10px] text-stone-500 mb-0.5 block">Protein (g)</label>
                    <input type="number" value={editMealModal.protein} onChange={(e) => setEditMealModal({ ...editMealModal, protein: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                  </div>
                </div>
                <div className="flex gap-2">
                  <div className="flex-1">
                    <label className="text-[10px] text-stone-500 mb-0.5 block">Carbs (g)</label>
                    <input type="number" value={editMealModal.carbs} onChange={(e) => setEditMealModal({ ...editMealModal, carbs: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                  </div>
                  <div className="flex-1">
                    <label className="text-[10px] text-stone-500 mb-0.5 block">Fat (g)</label>
                    <input type="number" value={editMealModal.fat} onChange={(e) => setEditMealModal({ ...editMealModal, fat: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                  </div>
                </div>
              </div>
            )}

            {/* Notes */}
            <div className="mb-4">
              <label className="text-xs font-medium text-stone-600 mb-1 block">Notes</label>
              <textarea
                placeholder="Prep method, restaurant, context…"
                value={editMealModal.notes}
                onChange={(e) => setEditMealModal({ ...editMealModal, notes: e.target.value.slice(0, NOTES_MAX) })}
                rows={2}
                maxLength={NOTES_MAX}
                className="w-full px-3 py-2 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400 resize-none"
              />
              {editMealModal.notes.length > 0 && (
                <p className={`text-[10px] text-right mt-0.5 ${editMealModal.notes.length >= NOTES_MAX ? "text-red-500" : "text-stone-400"}`}>
                  {editMealModal.notes.length}/{NOTES_MAX}
                </p>
              )}
            </div>

            <div className="flex gap-2">
              <button onClick={() => { setEditMealModal(null); setEditMealShowPicker(false); setEditMealCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" }); }} className="flex-1 bg-stone-100 text-stone-700 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200">Cancel</button>
              <button onClick={updateMeal} disabled={!editMealModal.name.trim()} className="flex-1 bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-stone-800 disabled:bg-stone-300">Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* InBody Scan Modal */}
      {scanModal && (
        <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-50 p-4" onClick={() => setScanModal(null)}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-md shadow-xl max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-lg font-bold text-stone-900 mb-1">Add InBody Scan</h3>
            <p className="text-xs text-stone-500 mb-4">Enter results from your scan.</p>
            <div className="space-y-2">
              {[
                { label: "Scan Date", key: "date", type: "date" },
                { label: "Weight (lbs)", key: "weight", type: "number", step: "0.1", placeholder: "e.g., 250" },
                { label: "Body Fat %", key: "bodyFat", type: "number", step: "0.1", placeholder: "e.g., 23.7" },
                { label: "Skeletal Muscle Mass (lbs)", key: "skeletalMuscle", type: "number", step: "0.1", placeholder: "e.g., 108" },
                { label: "Body Fat Mass (lbs)", key: "bodyFatMass", type: "number", step: "0.1", placeholder: "e.g., 60" },
                { label: "Metabolic Rate (kcal)", key: "bmr", type: "number", step: "1", placeholder: "e.g., 2649" },
              ].map(({ label, key, type, step, placeholder }) => (
                <div key={key}>
                  <label className="text-xs text-stone-500 mb-1 block">{label}</label>
                  <input type={type} step={step} placeholder={placeholder} value={scanModal[key]} onChange={(e) => setScanModal({ ...scanModal, [key]: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                </div>
              ))}
            </div>
            <div className="flex gap-2 mt-4">
              <button onClick={() => setScanModal(null)} className="flex-1 bg-stone-100 text-stone-700 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200">Cancel</button>
              <button onClick={saveScan} disabled={!scanModal.date || !scanModal.weight} className="flex-1 bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium disabled:bg-stone-300 disabled:cursor-not-allowed hover:bg-stone-800">Save Scan</button>
            </div>
          </div>
        </div>
      )}

      {/* Portion Modal */}
      {portionModal && (
        <div className="fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-50 p-4" onClick={() => setPortionModal(null)}>
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl" onClick={(e) => e.stopPropagation()}>
            <h3 className="text-lg font-bold text-stone-900 mb-1">{portionModal.name}</h3>
            <p className="text-xs text-stone-500 mb-4">{portionModal.cal} cal · {portionModal.protein}g protein per {portionModal.unit}</p>
            <label className="text-sm font-medium text-stone-700 mb-2 block">How many {portionModal.unitLabel}?</label>
            <div className="flex items-center gap-3 mb-4">
              <button onClick={() => setPortionQty(Math.max(0, (parseFloat(portionQty) || 0) - 0.5))} className="w-10 h-10 rounded-lg bg-stone-100 text-stone-700 text-xl font-bold hover:bg-stone-200 active:bg-stone-300">−</button>
              <input type="number" step="0.5" min="0" value={portionQty} onChange={(e) => setPortionQty(e.target.value)} className="flex-1 text-center px-3 py-2 rounded-lg border border-stone-200 text-lg font-semibold focus:outline-none focus:border-stone-400" />
              <button onClick={() => setPortionQty((parseFloat(portionQty) || 0) + 0.5)} className="w-10 h-10 rounded-lg bg-stone-100 text-stone-700 text-xl font-bold hover:bg-stone-200 active:bg-stone-300">+</button>
            </div>
            <div className="bg-stone-50 rounded-lg p-3 mb-4">
              <p className="text-sm text-stone-600 mb-1">Will log:</p>
              <p className="text-lg font-bold text-stone-900 mb-1">{Math.round(portionModal.cal * (parseFloat(portionQty) || 0))} cal</p>
              <p className="text-xs text-stone-500">{Math.round(portionModal.protein * (parseFloat(portionQty) || 0) * 10) / 10}g protein · {Math.round((portionModal.carbs || 0) * (parseFloat(portionQty) || 0) * 10) / 10}g carbs · {Math.round((portionModal.fat || 0) * (parseFloat(portionQty) || 0) * 10) / 10}g fat</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setPortionModal(null)} className="flex-1 bg-stone-100 text-stone-700 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200">Cancel</button>
              <button onClick={confirmPortion} className="flex-1 bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-stone-800">Add to Log</button>
            </div>
          </div>
        </div>
      )}

      {showGoalEditModal && <GoalEditModal goalSettings={goalSettings} onSave={saveGoalSettings} onCancel={() => setShowGoalEditModal(false)} />}
    </div>
  );
}

function GoalEditModal({ goalSettings, onSave, onCancel }) {
  const [draft, setDraft] = useState(goalSettings);
  const updateField = (field, value) => setDraft({ ...draft, [field]: value });

  return (
    <div className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
      <div className="bg-white rounded-t-2xl sm:rounded-2xl p-5 w-full sm:max-w-md max-h-[90vh] overflow-y-auto">
        <h2 className="text-lg font-bold text-stone-900 mb-4">Edit Goal</h2>
        <div className="space-y-3">
          {[
            { label: "Target weight (lbs)", key: "targetWeight", type: "number" },
            { label: 'Target date (e.g., "mid-May", "June 15")', key: "targetDate", type: "text" },
            { label: "Starting weight (lbs)", key: "startWeight", type: "number", placeholder: "e.g., 250" },
            { label: 'Lbs per week pace (e.g., "1-1.2", "0.5")', key: "lbsPerWeek", type: "text" },
            { label: 'Scan date (e.g., "May 6")', key: "scanDate", type: "text" },
          ].map(({ label, key, type, placeholder }) => (
            <div key={key}>
              <label className="text-xs font-medium text-stone-600 mb-1 block">{label}</label>
              <input type={type} value={draft[key]} onChange={(e) => updateField(key, e.target.value)} placeholder={placeholder} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
            </div>
          ))}
          {[
            { label: "The Vision (main line)", key: "vision", rows: 3 },
            { label: "The Vision (subtext)", key: "visionSubtext", rows: 2 },
          ].map(({ label, key, rows }) => (
            <div key={key}>
              <label className="text-xs font-medium text-stone-600 mb-1 block">{label}</label>
              <textarea value={draft[key]} onChange={(e) => updateField(key, e.target.value)} rows={rows} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400 resize-none" />
            </div>
          ))}
        </div>
        <div className="flex gap-2 mt-5">
          <button onClick={onCancel} className="flex-1 bg-stone-100 text-stone-700 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200">Cancel</button>
          <button onClick={() => onSave(draft)} className="flex-1 bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-stone-800">Save Goal</button>
        </div>
      </div>
    </div>
  );
}

function WhyView({ weeklyData, activeGoal, weeklyCommitment, saveCommitment, commitmentWeekStart, streakCount, goalSettings, onEditGoal }) {
  const [editingCommitment, setEditingCommitment] = useState(false);
  const [commitmentDraft, setCommitmentDraft] = useState(weeklyCommitment || "");

  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const currentMonday = new Date(now.setDate(diff));
  const currentWeekStart = formatLocalDate(currentMonday);
  const isCurrentWeek = commitmentWeekStart === currentWeekStart;
  const displayCommitment = isCurrentWeek ? weeklyCommitment : "";

  const loggedDays = weeklyData.filter((d) => d.hasData);
  const avgCal = loggedDays.length > 0 ? Math.round(loggedDays.reduce((s, d) => s + d.cal, 0) / loggedDays.length) : 0;
  const avgProtein = loggedDays.length > 0 ? Math.round(loggedDays.reduce((s, d) => s + d.protein, 0) / loggedDays.length) : 0;

  let alignmentStatus = "nodata";
  let alignmentMessage = "";

  if (loggedDays.length === 0) {
    alignmentStatus = "nodata";
    alignmentMessage = "Start logging to see alignment with your goal.";
  } else if (loggedDays.length < 3) {
    alignmentStatus = "early";
    alignmentMessage = `Only ${loggedDays.length} day${loggedDays.length === 1 ? "" : "s"} logged. Keep going — alignment builds with consistency.`;
  } else {
    const calOver = avgCal > activeGoal.cal + 150;
    const proteinShort = avgProtein < activeGoal.protein - 20;
    const calOk = avgCal <= activeGoal.cal + 150;
    const proteinOk = avgProtein >= activeGoal.protein - 20;

    if (calOk && proteinOk) {
      alignmentStatus = "aligned";
      alignmentMessage = "You're eating like the man you're building. Keep executing — momentum compounds.";
    } else if (calOver && proteinShort) {
      alignmentStatus = "off";
      alignmentMessage = "Stop. You're eating more calories than you need AND less protein than you need. This is the exact combo that burns muscle and stalls fat loss. Every day you stay here is a day the mirror lies to you. Mid-May is 4 weeks out. The version of you at 240 with visible definition is watching. Don't make him wait longer because of a drink you didn't need or a meal you didn't log. Fix it this week. Starting with the next meal.";
    } else if (calOver) {
      alignmentStatus = "drift";
      alignmentMessage = `You're ${avgCal - activeGoal.cal} cal over your target on average. Protein is solid — the leak is calories. But the calories are the leak, and leaks sink goals. It's almost certainly weekend drift, alcohol, or "just one more" snacks. You know exactly where the problem is. The scale doesn't care about your excuses. Own this week.`;
    } else if (proteinShort) {
      alignmentStatus = "drift";
      alignmentMessage = `You're short ${activeGoal.protein - avgProtein}g of protein daily. At a deficit with low protein, you lose muscle — which means the body underneath won't look the way you want when you hit 240. You built 108 lbs of muscle. Don't waste it by skipping a shake. Add protein to every meal this week, non-negotiable.`;
    }
  }

  const statusStyles = {
    aligned: "bg-emerald-50 border-emerald-200 text-emerald-900",
    drift: "bg-amber-50 border-amber-200 text-amber-900",
    off: "bg-red-50 border-red-200 text-red-900",
    early: "bg-stone-50 border-stone-200 text-stone-900",
    nodata: "bg-stone-50 border-stone-200 text-stone-600",
  };

  const statusLabels = { aligned: "Aligned ✓", drift: "Slight Drift", off: "Off Track", early: "Early Days", nodata: "No Data" };

  return (
    <div className="space-y-4">
      <div className={`rounded-2xl p-5 border-2 ${statusStyles[alignmentStatus]}`}>
        <div className="flex items-center justify-between mb-2">
          <p className="text-xs font-semibold uppercase tracking-wider opacity-70">Eating vs Goal</p>
          <span className="text-xs font-bold uppercase tracking-wide">{statusLabels[alignmentStatus]}</span>
        </div>
        <p className="text-sm leading-relaxed">{alignmentMessage}</p>
        {loggedDays.length > 0 && <p className="text-xs mt-3 opacity-70">{loggedDays.length}-day avg: {avgCal} cal · {avgProtein}g protein</p>}
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <div className="flex items-center justify-between mb-3">
          <p className="text-xs font-semibold uppercase tracking-wider text-stone-500">This Week's Commitment</p>
          {!editingCommitment && displayCommitment && (
            <button onClick={() => { setEditingCommitment(true); setCommitmentDraft(displayCommitment); }} className="text-xs text-stone-500 hover:text-stone-700 underline">Edit</button>
          )}
        </div>
        {editingCommitment || !displayCommitment ? (
          <div>
            <textarea placeholder="This week I commit to… (e.g., Hit 198g protein every day. Max 2 drinks on Saturday. Prep Sunday at 2pm.)" value={commitmentDraft} onChange={(e) => setCommitmentDraft(e.target.value)} rows={3} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400 resize-none mb-2" />
            <button onClick={() => { saveCommitment(commitmentDraft.trim()); setEditingCommitment(false); }} disabled={!commitmentDraft.trim()} className="w-full bg-stone-900 text-white rounded-lg py-2 text-sm font-medium disabled:bg-stone-300 hover:bg-stone-800">Lock It In</button>
          </div>
        ) : (
          <p className="text-base text-stone-900 leading-relaxed font-medium">{displayCommitment}</p>
        )}
      </div>

      <div className="bg-stone-900 rounded-2xl p-5 text-white relative">
        <div className="flex items-start justify-between mb-2">
          <p className="text-xs font-semibold uppercase tracking-wider text-stone-400">The Goal</p>
          <button onClick={onEditGoal} className="text-xs text-stone-400 hover:text-white underline">Edit</button>
        </div>
        <p className="text-2xl font-bold mb-1">{goalSettings.targetWeight} lbs by {goalSettings.targetDate}</p>
        <p className="text-sm text-stone-300">{goalSettings.startWeight && Number(goalSettings.startWeight) > Number(goalSettings.targetWeight) ? `${Number(goalSettings.startWeight) - Number(goalSettings.targetWeight)} lbs down · ` : ""}{goalSettings.lbsPerWeek} lbs per week · InBody scan {goalSettings.scanDate}</p>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-stone-500 mb-3">The Vision</p>
        <p className="text-base text-stone-900 leading-relaxed mb-3">{goalSettings.vision}</p>
        <p className="text-sm text-stone-600 leading-relaxed">{goalSettings.visionSubtext}</p>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-stone-500 mb-3">Why It Matters</p>
        <div className="space-y-2 text-sm text-stone-700">
          <p>• Confidence, dating, showing up fully in life</p>
          <p>• Attracting abundance: love, wealth, opportunity, meaningful connections</p>
          <p>• Breaking old cycles and patterns that no longer serve you</p>
          <p>• Building a life that feels as good on the inside as it looks on the outside</p>
        </div>
      </div>

      <div className="bg-emerald-50 rounded-2xl p-5 border border-emerald-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-emerald-700 mb-2">Remember</p>
        <p className="text-sm text-stone-900 leading-relaxed">Your muscle base is already built — 108 lbs of it. You're not building from scratch. You're uncovering what you've already earned.</p>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-stone-500 mb-3">Non-Negotiables</p>
        <div className="space-y-2 text-sm text-stone-700">
          <p>• 198g protein daily · protect the muscle</p>
          <p>• Under 2,100 calories · create the deficit</p>
          <p>• Lift 3x/week · progressive overload every session</p>
          <p>• Orangetheory 2x/week · booked in advance</p>
          <p>• Weekend drift is the enemy · own Friday through Sunday</p>
        </div>
        <div className="mt-4 pt-4 border-t border-stone-200">
          <p className="text-[10px] font-semibold uppercase tracking-wider text-stone-500 mb-1.5">The Weekend Truth</p>
          <p className="text-sm text-stone-700 leading-relaxed">This is where the 10 lbs lives. 5 disciplined weekdays + 2 loose weekend days = flat week. The guys who hit their goals don't train harder — they stop undoing Monday through Friday every Friday night. Own the weekend and the rest takes care of itself.</p>
        </div>
      </div>
    </div>
  );
}

function GoalView({ goalIdx, setGoalIdx, weeklyData, activeGoal }) {
  const loggedDays = weeklyData.filter((d) => d.hasData);
  const avgCal = loggedDays.length > 0 ? Math.round(loggedDays.reduce((s, d) => s + d.cal, 0) / loggedDays.length) : 0;
  const avgProtein = loggedDays.length > 0 ? Math.round(loggedDays.reduce((s, d) => s + d.protein, 0) / loggedDays.length) : 0;

  const calStatus = loggedDays.length === 0 ? "nodata" : avgCal > activeGoal.cal + 100 ? "over" : avgCal < activeGoal.cal - 300 ? "under" : "aligned";
  const proteinStatus = loggedDays.length === 0 ? "nodata" : avgProtein >= activeGoal.protein - 10 ? "aligned" : avgProtein >= activeGoal.protein - 30 ? "under" : "way-under";

  const statusColor = (s) => {
    if (s === "aligned") return "text-emerald-600";
    if (s === "over" || s === "way-under") return "text-red-600";
    if (s === "under") return "text-amber-600";
    return "text-stone-400";
  };

  const statusLabel = (s, diff, unit) => {
    if (s === "nodata") return "No data yet";
    if (s === "aligned") return "On target ✓";
    if (s === "over") return `${Math.abs(diff)} ${unit} over`;
    if (s === "under") return `${Math.abs(diff)} ${unit} under`;
    if (s === "way-under") return `${Math.abs(diff)} ${unit} short`;
    return "";
  };

  return (
    <div>
      <div className="mb-6">
        <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-3">Current Goal</h2>
        <div className="space-y-2">
          {GOAL_PRESETS.map((goal, idx) => {
            const isActive = idx === goalIdx;
            return (
              <button key={goal.id} onClick={() => setGoalIdx(idx)} className={`w-full rounded-xl p-4 border-2 text-left transition-all ${isActive ? "bg-stone-900 border-stone-900 text-white" : "bg-white border-stone-200 hover:border-stone-400"}`}>
                <div className="flex items-center justify-between mb-1">
                  <span className={`font-semibold text-sm ${isActive ? "text-white" : "text-stone-900"}`}>{goal.name}</span>
                  {isActive && <span className="text-xs bg-white/20 text-white px-2 py-0.5 rounded-full">Active</span>}
                </div>
                <p className={`text-xs mb-2 ${isActive ? "text-stone-300" : "text-stone-500"}`}>{goal.subtitle}</p>
                <div className={`text-xs ${isActive ? "text-stone-200" : "text-stone-600"}`}>{goal.cal} cal · {goal.protein}P · {goal.carbs}C · {goal.fat}F</div>
              </button>
            );
          })}
        </div>
      </div>

      <div className="mb-6">
        <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-3">7-Day Alignment</h2>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
          {loggedDays.length === 0 ? (
            <p className="text-sm text-stone-400 italic text-center py-4">Log meals this week to see alignment</p>
          ) : (
            <>
              <p className="text-xs text-stone-500 mb-3">Based on {loggedDays.length} logged {loggedDays.length === 1 ? "day" : "days"}</p>
              <div className="space-y-3">
                <div className="flex items-center justify-between pb-3 border-b border-stone-100">
                  <div><p className="text-sm font-medium text-stone-900">Calories</p><p className="text-xs text-stone-500">Avg {avgCal} · Target {activeGoal.cal}</p></div>
                  <span className={`text-sm font-semibold ${statusColor(calStatus)}`}>{statusLabel(calStatus, avgCal - activeGoal.cal, "cal")}</span>
                </div>
                <div className="flex items-center justify-between">
                  <div><p className="text-sm font-medium text-stone-900">Protein</p><p className="text-xs text-stone-500">Avg {avgProtein}g · Target {activeGoal.protein}g</p></div>
                  <span className={`text-sm font-semibold ${statusColor(proteinStatus)}`}>{statusLabel(proteinStatus, avgProtein - activeGoal.protein, "g")}</span>
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {loggedDays.length >= 3 && (
        <div className="bg-stone-900 rounded-2xl p-4 text-white">
          <h3 className="text-sm font-semibold mb-2 uppercase tracking-wide">Coach Read</h3>
          <p className="text-sm text-stone-200 leading-relaxed">
            {calStatus === "over" && proteinStatus === "aligned" && <>You're eating above target. Protein is solid — the leak is calories. Cut 150-200 from evening snacks or drinks.</>}
            {calStatus === "over" && proteinStatus !== "aligned" && <>Calories up, protein down — that's a dangerous combo for muscle retention. Replace carb-heavy foods with lean protein.</>}
            {calStatus === "aligned" && proteinStatus === "aligned" && <>Dialed in. Keep this consistency and the weight will move.</>}
            {calStatus === "aligned" && proteinStatus !== "aligned" && <>Calories on point but protein short. Add a second shake or extra chicken at dinner.</>}
            {calStatus === "under" && <>Eating below target. Good for fat loss, but watch energy and recovery. Don't under-eat yourself into burnout.</>}
            {calStatus === "nodata" && <>Log consistently and I'll read your pattern.</>}
          </p>
        </div>
      )}
    </div>
  );
}

function WeekView({ weeklyData, activeGoal }) {
  const loggedDays = weeklyData.filter((d) => d.hasData);
  const avgCal = loggedDays.length > 0 ? Math.round(loggedDays.reduce((s, d) => s + d.cal, 0) / loggedDays.length) : 0;
  const avgProtein = loggedDays.length > 0 ? Math.round(loggedDays.reduce((s, d) => s + d.protein, 0) / loggedDays.length) : 0;
  const proteinHitCount = loggedDays.filter((d) => d.protein >= activeGoal.protein).length;
  const calUnderCount = loggedDays.filter((d) => d.cal <= activeGoal.cal && d.cal > 0).length;
  const maxCal = Math.max(...weeklyData.map((d) => d.cal), activeGoal.cal);

  return (
    <div>
      <div className="grid grid-cols-2 gap-3 mb-6">
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200"><p className="text-xs text-stone-500 mb-1">Avg Calories</p><p className="text-2xl font-bold text-stone-900">{avgCal}</p><p className="text-xs text-stone-400 mt-1">Target: {activeGoal.cal}</p></div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200"><p className="text-xs text-stone-500 mb-1">Avg Protein</p><p className="text-2xl font-bold text-stone-900">{avgProtein}g</p><p className="text-xs text-stone-400 mt-1">Target: {activeGoal.protein}g</p></div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200"><p className="text-xs text-stone-500 mb-1">Hit {activeGoal.protein}g Protein</p><p className="text-2xl font-bold text-emerald-600">{proteinHitCount}/{loggedDays.length}</p><p className="text-xs text-stone-400 mt-1">Days on target</p></div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200"><p className="text-xs text-stone-500 mb-1">Under {activeGoal.cal}</p><p className="text-2xl font-bold text-emerald-600">{calUnderCount}/{loggedDays.length}</p><p className="text-xs text-stone-400 mt-1">Days under cal cap</p></div>
      </div>

      <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200 mb-6">
        <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-4">Last 7 Days</h2>
        <div className="space-y-3">
          {weeklyData.map((day) => {
            const calPct = (day.cal / maxCal) * 100;
            const proteinPct = Math.min((day.protein / activeGoal.protein) * 100, 100);
            const calOver = day.cal > activeGoal.cal;
            const proteinHit = day.protein >= activeGoal.protein;
            return (
              <div key={day.date}>
                <div className="flex items-center justify-between mb-1">
                  <span className={`text-sm font-medium ${day.isToday ? "text-stone-900" : "text-stone-600"}`}>
                    {day.dayName} {day.dayNum}{day.isToday && <span className="ml-1 text-xs text-stone-400">(today)</span>}
                  </span>
                  {day.hasData ? (
                    <span className="text-xs text-stone-500">
                      <span className={calOver ? "text-red-600 font-medium" : ""}>{Math.round(day.cal)}</span>{" cal · "}
                      <span className={proteinHit ? "text-emerald-600 font-medium" : ""}>{Math.round(day.protein)}g</span>
                    </span>
                  ) : (
                    <span className="text-xs text-stone-400 italic">No data</span>
                  )}
                </div>
                {day.hasData && (
                  <div className="space-y-1">
                    <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${calOver ? "bg-red-500" : "bg-stone-900"}`} style={{ width: `${calPct}%` }} /></div>
                    <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${proteinHit ? "bg-emerald-500" : "bg-stone-400"}`} style={{ width: `${proteinPct}%` }} /></div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200 text-xs text-stone-500">
        <div className="flex items-center gap-2 mb-2"><div className="w-3 h-1.5 bg-stone-900 rounded-full"></div><span>Calories (red if over {activeGoal.cal})</span></div>
        <div className="flex items-center gap-2"><div className="w-3 h-1.5 bg-emerald-500 rounded-full"></div><span>Protein (green if {activeGoal.protein}g+ hit)</span></div>
      </div>
    </div>
  );
}

const container = document.getElementById("root");
const root = ReactDOM.createRoot(container);
root.render(React.createElement(MacroTracker));
  </script>
</body>
</html>
