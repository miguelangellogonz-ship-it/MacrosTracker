            Save Goal
          </button>
        </div>
      </div>
    </div>
  );
}

function WhyView({ weeklyData, activeGoal, weeklyCommitment, saveCommitment, commitmentWeekStart, streakCount, goalSettings, onEditGoal }) {
  const [editingCommitment, setEditingCommitment] = useState(false);
  const [commitmentDraft, setCommitmentDraft] = useState(weeklyCommitment || "");

  // Check if commitment is from current week
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const currentMonday = new Date(now.setDate(diff));
  const currentMondayYyyy = currentMonday.getFullYear();
  const currentMondayMm = String(currentMonday.getMonth() + 1).padStart(2, "0");
  const currentMondayDd = String(currentMonday.getDate()).padStart(2, "0");
  const currentWeekStart = `${currentMondayYyyy}-${currentMondayMm}-${currentMondayDd}`;
  const isCurrentWeek = commitmentWeekStart === currentWeekStart;
  const displayCommitment = isCurrentWeek ? weeklyCommitment : "";

  const loggedDays = weeklyData.filter((d) => d.hasData);
  const avgCal = loggedDays.length > 0
    ? Math.round(loggedDays.reduce((s, d) => s + d.cal, 0) / loggedDays.length)
    : 0;
  const avgProtein = loggedDays.length > 0
    ? Math.round(loggedDays.reduce((s, d) => s + d.protein, 0) / loggedDays.length)
    : 0;

  // Determine alignment
  let alignmentStatus = "nodata";
  let alignmentMessage = "";

  if (loggedDays.length === 0) {
    alignmentStatus = "nodata";
    alignmentMessage = "Start logging to see alignment with your goal.";
  } else if (loggedDays.length < 3) {
    alignmentStatus = "early";
    alignmentMessage = `Only ${loggedDays.length} day${loggedDays.length === 1 ? "" : "s"} logged. Keep going — alignment builds with consistency.`;
  } else {
    const calOver = avgCal > activeGoal.cal + 150;
    const proteinShort = avgProtein < activeGoal.protein - 20;
    const calOk = avgCal <= activeGoal.cal + 150;
    const proteinOk = avgProtein >= activeGoal.protein - 20;

    if (calOk && proteinOk) {
      alignmentStatus = "aligned";
      alignmentMessage = "You're eating like the man you're building. Keep executing — momentum compounds.";
    } else if (calOver && proteinShort) {
      alignmentStatus = "off";
      alignmentMessage = "Stop. You're eating more calories than you need AND less protein than you need. This is the exact combo that burns muscle and stalls fat loss. Every day you stay here is a day the mirror lies to you. Mid-May is 4 weeks out. The version of you at 240 with visible definition is watching. Don't make him wait longer because of a drink you didn't need or a meal you didn't log. Fix it this week. Starting with the next meal.";
    } else if (calOver) {
      alignmentStatus = "drift";
      alignmentMessage = `You're ${avgCal - activeGoal.cal} cal over your target on average. Protein is solid — you're protecting the muscle. But the calories are the leak, and leaks sink goals. It's almost certainly weekend drift, alcohol, or "just one more" snacks. You know exactly where the problem is. The scale doesn't care about your excuses. Own this week.`;
    } else if (proteinShort) {
      alignmentStatus = "drift";
      alignmentMessage = `You're short ${activeGoal.protein - avgProtein}g of protein daily. At a deficit with low protein, you lose muscle — which means the body underneath won't look the way you want when you hit 240. You built 108 lbs of muscle. Don't waste it by skipping a shake. Add protein to every meal this week, non-negotiable.`;
    }
  }

  const statusStyles = {
    aligned: "bg-emerald-50 border-emerald-200 text-emerald-900",
    drift: "bg-amber-50 border-amber-200 text-amber-900",
    off: "bg-red-50 border-red-200 text-red-900",
    early: "bg-stone-50 border-stone-200 text-stone-900",
    nodata: "bg-stone-50 border-stone-200 text-stone-600",
  };

  const statusLabels = {
    aligned: "Aligned ✓",
    drift: "Slight Drift",
    off: "Off Track",
    early: "Early Days",
    nodata: "No Data",
  };

  return (
    <div className="space-y-4">
      {/* Alignment Status */}
      <div className={`rounded-2xl p-5 border-2 ${statusStyles[alignmentStatus]}`}>
        <div className="flex items-center justify-between mb-2">
          <p className="text-xs font-semibold uppercase tracking-wider opacity-70">
            Eating vs Goal
          </p>
          <span className="text-xs font-bold uppercase tracking-wide">
            {statusLabels[alignmentStatus]}
          </span>
        </div>
        <p className="text-sm leading-relaxed">{alignmentMessage}</p>
        {loggedDays.length > 0 && (
          <p className="text-xs mt-3 opacity-70">
            {loggedDays.length}-day avg: {avgCal} cal · {avgProtein}g protein
          </p>
        )}
      </div>

      {/* This Week's Commitment */}
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <div className="flex items-center justify-between mb-3">
          <p className="text-xs font-semibold uppercase tracking-wider text-stone-500">
            This Week's Commitment
          </p>
          {!editingCommitment && displayCommitment && (
            <button
              onClick={() => { setEditingCommitment(true); setCommitmentDraft(displayCommitment); }}
              className="text-xs text-stone-500 hover:text-stone-700 underline"
            >
              Edit
            </button>
          )}
        </div>
        {editingCommitment || !displayCommitment ? (
          <div>
            <textarea
              placeholder="This week I commit to... (e.g., Hit 198g protein every day. Max 2 drinks on Saturday. Prep Sunday at 2pm.)"
              value={commitmentDraft}
              onChange={(e) => setCommitmentDraft(e.target.value)}
              rows={3}
              className="w-full px-3 py-2 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400 resize-none mb-2"
            />
            <button
              onClick={() => {
                saveCommitment(commitmentDraft.trim());
                setEditingCommitment(false);
              }}
              disabled={!commitmentDraft.trim()}
              className="w-full bg-stone-900 text-white rounded-lg py-2 text-sm font-medium disabled:bg-stone-300 hover:bg-stone-800"
            >
              Lock It In
            </button>
          </div>
        ) : (
          <p className="text-base text-stone-900 leading-relaxed font-medium">
            {displayCommitment}
          </p>
        )}
      </div>

      {/* The Goal */}
      <div className="bg-stone-900 rounded-2xl p-5 text-white relative">
        <div className="flex items-start justify-between mb-2">
          <p className="text-xs font-semibold uppercase tracking-wider text-stone-400">
            The Goal
          </p>
          <button
            onClick={onEditGoal}
            className="text-xs text-stone-400 hover:text-white underline"
          >
            Edit
          </button>
        </div>
        <p className="text-2xl font-bold mb-1">{goalSettings.targetWeight} lbs by {goalSettings.targetDate}</p>
        <p className="text-sm text-stone-300">
          {goalSettings.startWeight && Number(goalSettings.startWeight) > Number(goalSettings.targetWeight)
            ? `${Number(goalSettings.startWeight) - Number(goalSettings.targetWeight)} lbs down · `
            : ""}{goalSettings.lbsPerWeek} lbs per week · InBody scan {goalSettings.scanDate}
        </p>
      </div>

      {/* The Vision */}
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-stone-500 mb-3">
          The Vision
        </p>
        <p className="text-base text-stone-900 leading-relaxed mb-3">
          {goalSettings.vision}
        </p>
        <p className="text-sm text-stone-600 leading-relaxed">
          {goalSettings.visionSubtext}
        </p>
      </div>

      {/* Why It Matters */}
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-stone-500 mb-3">
          Why It Matters
        </p>
        <div className="space-y-2 text-sm text-stone-700">
          <p>• Confidence, dating, showing up fully in life</p>
          <p>• Attracting abundance: love, wealth, opportunity, meaningful connections</p>
          <p>• Breaking old cycles and patterns that no longer serve you</p>
          <p>• Building a life that feels as good on the inside as it looks on the outside</p>
        </div>
      </div>

      {/* The Truth */}
      <div className="bg-emerald-50 rounded-2xl p-5 border border-emerald-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-emerald-700 mb-2">
          Remember
        </p>
        <p className="text-sm text-stone-900 leading-relaxed">
          Your muscle base is already built — 108 lbs of it. You're not building from scratch. You're uncovering what you've already earned.
        </p>
      </div>

      {/* Non-Negotiables */}
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
        <p className="text-xs font-semibold uppercase tracking-wider text-stone-500 mb-3">
          Non-Negotiables
        </p>
        <div className="space-y-2 text-sm text-stone-700">
          <p>• 198g protein daily · protect the muscle</p>
          <p>• Under 2,100 calories · create the deficit</p>
          <p>• Lift 3x/week · progressive overload every session</p>
          <p>• Orangetheory 2x/week · booked in advance</p>
          <p>• Weekend drift is the enemy · own every Saturday</p>
        </div>
      </div>
    </div>
  );
}


function GoalView({ goalIdx, setGoalIdx, weeklyData, activeGoal }) {
  const loggedDays = weeklyData.filter((d) => d.hasData);
  const avgCal =
    loggedDays.length > 0
      ? Math.round(loggedDays.reduce((s, d) => s + d.cal, 0) / loggedDays.length)
      : 0;
  const avgProtein =
    loggedDays.length > 0
      ? Math.round(loggedDays.reduce((s, d) => s + d.protein, 0) / loggedDays.length)
      : 0;

  // Alignment status for each metric
  const calStatus =
    loggedDays.length === 0
      ? "nodata"
      : avgCal > activeGoal.cal + 100
      ? "over"
      : avgCal < activeGoal.cal - 300
      ? "under"
      : "aligned";
  const proteinStatus =
    loggedDays.length === 0
      ? "nodata"
      : avgProtein >= activeGoal.protein - 10
      ? "aligned"
      : avgProtein >= activeGoal.protein - 30
      ? "under"
      : "way-under";

  const statusColor = (s) => {
    if (s === "aligned") return "text-emerald-600";
    if (s === "over" || s === "way-under") return "text-red-600";
    if (s === "under") return "text-amber-600";
    return "text-stone-400";
  };

  const statusLabel = (s, diff, unit) => {
    if (s === "nodata") return "No data yet";
    if (s === "aligned") return "On target ✓";
    if (s === "over") return `${Math.abs(diff)} ${unit} over`;
    if (s === "under") return `${Math.abs(diff)} ${unit} under`;
    if (s === "way-under") return `${Math.abs(diff)} ${unit} short`;
    return "";
  };

  return (
    <div>
      {/* Goal Selector */}
      <div className="mb-6">
        <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-3">
          Current Goal
        </h2>
        <div className="space-y-2">
          {GOAL_PRESETS.map((goal, idx) => {
            const isActive = idx === goalIdx;
            return (
              <button
                key={goal.id}
                onClick={() => setGoalIdx(idx)}
                className={`w-full rounded-xl p-4 border-2 text-left transition-all ${
                  isActive
                    ? "bg-stone-900 border-stone-900 text-white"
                    : "bg-white border-stone-200 hover:border-stone-400"
                }`}
              >
                <div className="flex items-center justify-between mb-1">
                  <span
                    className={`font-semibold text-sm ${
                      isActive ? "text-white" : "text-stone-900"
                    }`}
                  >
                    {goal.name}
                  </span>
                  {isActive && (
                    <span className="text-xs bg-white/20 text-white px-2 py-0.5 rounded-full">
                      Active
                    </span>
                  )}
                </div>
                <p
                  className={`text-xs mb-2 ${
                    isActive ? "text-stone-300" : "text-stone-500"
                  }`}
                >
                  {goal.subtitle}
                </p>
                <div
                  className={`text-xs ${
                    isActive ? "text-stone-200" : "text-stone-600"
                  }`}
                >
                  {goal.cal} cal · {goal.protein}P · {goal.carbs}C · {goal.fat}F
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Weekly Alignment */}
      <div className="mb-6">
        <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-3">
          7-Day Alignment
        </h2>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
          {loggedDays.length === 0 ? (
            <p className="text-sm text-stone-400 italic text-center py-4">
              Log meals this week to see alignment
            </p>
          ) : (
            <>
              <p className="text-xs text-stone-500 mb-3">
                Based on {loggedDays.length} logged {loggedDays.length === 1 ? "day" : "days"}
              </p>
              <div className="space-y-3">
                {/* Calories */}
                <div className="flex items-center justify-between pb-3 border-b border-stone-100">
                  <div>
                    <p className="text-sm font-medium text-stone-900">Calories</p>
                    <p className="text-xs text-stone-500">
                      Avg {avgCal} · Target {activeGoal.cal}
                    </p>
                  </div>
                  <span className={`text-sm font-semibold ${statusColor(calStatus)}`}>
                    {statusLabel(calStatus, avgCal - activeGoal.cal, "cal")}
                  </span>
                </div>
                {/* Protein */}
                <div className="flex items-center justify-between">
                  <div>
                    <p className="text-sm font-medium text-stone-900">Protein</p>
                    <p className="text-xs text-stone-500">
                      Avg {avgProtein}g · Target {activeGoal.protein}g
                    </p>
                  </div>
                  <span className={`text-sm font-semibold ${statusColor(proteinStatus)}`}>
                    {statusLabel(
                      proteinStatus,
                      avgProtein - activeGoal.protein,
                      "g"
                    )}
                  </span>
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {/* Coaching Note */}
      {loggedDays.length >= 3 && (
        <div className="bg-stone-900 rounded-2xl p-4 text-white">
          <h3 className="text-sm font-semibold mb-2 uppercase tracking-wide">
            Coach Read
          </h3>
          <p className="text-sm text-stone-200 leading-relaxed">
            {calStatus === "over" && proteinStatus === "aligned" && (
              <>You're eating above target. Protein is solid — the leak is calories. Cut 150-200 from evening snacks or drinks.</>
            )}
            {calStatus === "over" && proteinStatus !== "aligned" && (
              <>Calories up, protein down — that's a dangerous combo for muscle retention. Replace carb-heavy foods with lean protein.</>
            )}
            {calStatus === "aligned" && proteinStatus === "aligned" && (
              <>Dialed in. Keep this consistency and the weight will move.</>
            )}
            {calStatus === "aligned" && proteinStatus !== "aligned" && (
              <>Calories on point but protein short. Add a second shake or extra chicken at dinner.</>
            )}
            {calStatus === "under" && (
              <>Eating below target. Good for fat loss, but watch energy and recovery. Don't under-eat yourself into burnout.</>
            )}
            {calStatus === "nodata" && <>Log consistently and I'll read your pattern.</>}
          </p>
        </div>
      )}
    </div>
  );
}


function WeekView({ weeklyData, activeGoal }) {
  const loggedDays = weeklyData.filter((d) => d.hasData);
  const avgCal =
    loggedDays.length > 0
      ? Math.round(
          loggedDays.reduce((s, d) => s + d.cal, 0) / loggedDays.length
        )
      : 0;
  const avgProtein =
    loggedDays.length > 0
      ? Math.round(
          loggedDays.reduce((s, d) => s + d.protein, 0) / loggedDays.length
        )
      : 0;
  const proteinHitCount = loggedDays.filter((d) => d.protein >= activeGoal.protein)
    .length;
  const calUnderCount = loggedDays.filter((d) => d.cal <= activeGoal.cal && d.cal > 0)
    .length;

  const maxCal = Math.max(
    ...weeklyData.map((d) => d.cal),
    activeGoal.cal
  );

  return (
    <div>
      {/* Summary Stats */}
      <div className="grid grid-cols-2 gap-3 mb-6">
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
          <p className="text-xs text-stone-500 mb-1">Avg Calories</p>
          <p className="text-2xl font-bold text-stone-900">{avgCal}</p>
          <p className="text-xs text-stone-400 mt-1">
            Target: {activeGoal.cal}
          </p>
        </div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
          <p className="text-xs text-stone-500 mb-1">Avg Protein</p>
          <p className="text-2xl font-bold text-stone-900">{avgProtein}g</p>
          <p className="text-xs text-stone-400 mt-1">
            Target: {activeGoal.protein}g
          </p>
        </div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
          <p className="text-xs text-stone-500 mb-1">Hit {activeGoal.protein}g Protein</p>
          <p className="text-2xl font-bold text-emerald-600">
            {proteinHitCount}/{loggedDays.length}
          </p>
          <p className="text-xs text-stone-400 mt-1">Days on target</p>
        </div>
        <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
          <p className="text-xs text-stone-500 mb-1">Under {activeGoal.cal}</p>
          <p className="text-2xl font-bold text-emerald-600">
            {calUnderCount}/{loggedDays.length}
          </p>
          <p className="text-xs text-stone-400 mt-1">Days under cal cap</p>
        </div>
      </div>

      {/* Daily Breakdown */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200 mb-6">
        <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-4">
          Last 7 Days
        </h2>
        <div className="space-y-3">
          {weeklyData.map((day) => {
            const calPct = (day.cal / maxCal) * 100;
            const proteinPct = Math.min(
              (day.protein / activeGoal.protein) * 100,
              100
            );
            const calOver = day.cal > activeGoal.cal;
            const proteinHit = day.protein >= activeGoal.protein;

            return (
              <div key={day.date}>
                <div className="flex items-center justify-between mb-1">
                  <div className="flex items-center gap-2">
                    <span
                      className={`text-sm font-medium ${
                        day.isToday ? "text-stone-900" : "text-stone-600"
                      }`}
                    >
                      {day.dayName} {day.dayNum}
                      {day.isToday && (
                        <span className="ml-1 text-xs text-stone-400">
                          (today)
                        </span>
                      )}
                    </span>
                  </div>
                  {day.hasData ? (
                    <span className="text-xs text-stone-500">
                      <span
                        className={calOver ? "text-red-600 font-medium" : ""}
                      >
                        {Math.round(day.cal)}
                      </span>
                      {" cal · "}
                      <span
                        className={
                          proteinHit ? "text-emerald-600 font-medium" : ""
                        }
                      >
                        {Math.round(day.protein)}g
                      </span>
                    </span>
                  ) : (
                    <span className="text-xs text-stone-400 italic">
                      No data
                    </span>
                  )}
                </div>
                {day.hasData && (
                  <div className="space-y-1">
                    <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden">
                      <div
                        className={`h-full rounded-full ${
                          calOver ? "bg-red-500" : "bg-stone-900"
                        }`}
                        style={{ width: `${calPct}%` }}
                      />
                    </div>
                    <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden">
                      <div
                        className={`h-full rounded-full ${
                          proteinHit ? "bg-emerald-500" : "bg-stone-400"
                        }`}
                        style={{ width: `${proteinPct}%` }}
                      />
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Legend */}
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200 text-xs text-stone-500">
        <div className="flex items-center gap-2 mb-2">
          <div className="w-3 h-1.5 bg-stone-900 rounded-full"></div>
          <span>Calories (red if over {activeGoal.cal})</span>
        </div>
        <div className="flex items-center gap-2">
          <div className="w-3 h-1.5 bg-emerald-500 rounded-full"></div>
          <span>Protein (green if {activeGoal.protein}g+ hit)</span>
        </div>
      </div>
    </div>
  );
}
