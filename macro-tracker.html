window.storage = {
  get: async (key) => {
    const value = localStorage.getItem(key);
    if (value === null) throw new Error("Key not found");
    return { key, value };
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  list: async (prefix) => {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix };
  },
};

function formatLocalDate(d) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd}`;
}

function MacroTracker() {
  const [activeTab, setActiveTab] = useState("why");
  const [goalIdx, setGoalIdx] = useState(1);
  const [entries, setEntries] = useState([]);
  const [weeklyData, setWeeklyData] = useState([]);
  const [customName, setCustomName] = useState("");

  const [customCategory, setCustomCategory] = useState("auto");

  const [saveStatus, setSaveStatus] = useState("");
  const [portionModal, setPortionModal] = useState(null);
  const [portionQty, setPortionQty] = useState(1);
  const [customPresets, setCustomPresets] = useState([]);
  const [saveAsPreset, setSaveAsPreset] = useState(false);
  const [saveAsMeal, setSaveAsMeal] = useState(false);
  const [hiddenPresets, setHiddenPresets] = useState([]);
  const [usageCounts, setUsageCounts] = useState({});
  const [exportText, setExportText] = useState("");
  const [savedMeals, setSavedMeals] = useState([]);
  const [mealBuilder, setMealBuilder] = useState(null);
  const [ingredientPickerModal, setIngredientPickerModal] = useState(null);
  const [ingredientPickerQty, setIngredientPickerQty] = useState(1);
  const [mealScaleModal, setMealScaleModal] = useState(null);
  const [mealScale, setMealScale] = useState(1);
  const [editMealModal, setEditMealModal] = useState(null); // draft of meal being edited
  const [editMealShowPicker, setEditMealShowPicker] = useState(false); // 'false' | 'list' | 'custom'
  const [editMealCustomIng, setEditMealCustomIng] = useState({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" });
  const [builderShowCustomForm, setBuilderShowCustomForm] = useState(false);
  const [builderCustomIng, setBuilderCustomIng] = useState({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" });
  const [savedEntryIds, setSavedEntryIds] = useState(new Set());
  const [inbodyScans, setInbodyScans] = useState([]);
  const [scanModal, setScanModal] = useState(null);
  const [compareScanId, setCompareScanId] = useState(null);
  const [selectedDate, setSelectedDate] = useState(() => formatLocalDate(new Date()));
  const [showMantra, setShowMantra] = useState(true);
  const [weeklyCommitment, setWeeklyCommitment] = useState("");
  const [commitmentWeekStart, setCommitmentWeekStart] = useState("");
  const [streakCount, setStreakCount] = useState(0);
  const [goalSettings, setGoalSettings] = useState({
    targetWeight: "240",
    targetDate: "mid-May",
    startWeight: "250",
    lbsPerWeek: "1-1.2",
    scanDate: "May 6",
    vision: "The most magnetic, attractive version of yourself. 240 lbs with visible muscle definition.",
    visionSubtext: "The body that shows up differently — in the gym, on dates, at work, in the mirror.",
  });
  const [showGoalEditModal, setShowGoalEditModal] = useState(false);

  const today = formatLocalDate(new Date());
  const storageKey = `macros:${selectedDate}`;
  const activeGoal = GOAL_PRESETS[goalIdx];

  const shiftDate = (days) => {
    const d = new Date(selectedDate + "T00:00:00");
    d.setDate(d.getDate() + days);
    setSelectedDate(formatLocalDate(d));
  };

  useEffect(() => {
    let cancelled = false;
    async function loadEntriesForDate() {
      let loaded = [];
      try {
        const result = await window.storage.get(storageKey);
        if (result && result.value) {
          loaded = JSON.parse(result.value);
        }
      } catch (err) {}
      if (cancelled) return;
      setEntries(loaded);
      setSavedEntryIds(new Set(loaded.map((e) => e.id)));
    }
    loadEntriesForDate();
    return () => { cancelled = true; };
  }, [storageKey]);

  useEffect(() => {
    async function loadAll() {
      try {
        const goalResult = await window.storage.get("goal-selection");
        if (goalResult && goalResult.value) {
          const saved = parseInt(goalResult.value, 10);
          if (!isNaN(saved) && saved >= 0 && saved < GOAL_PRESETS.length) {
            setGoalIdx(saved);
          }
        }
      } catch (err) {}
      try {
        const presetsResult = await window.storage.get("custom-presets");
        if (presetsResult && presetsResult.value) {
          setCustomPresets(JSON.parse(presetsResult.value));
        }
      } catch (err) {}
      try {
        const usageResult = await window.storage.get("usage-counts");
        if (usageResult && usageResult.value) {
          setUsageCounts(JSON.parse(usageResult.value));
        }
      } catch (err) {}
      try {
        const mealsResult = await window.storage.get("saved-meals");
        if (mealsResult && mealsResult.value) {
          setSavedMeals(JSON.parse(mealsResult.value));
        }
      } catch (err) {}
      try {
        const hiddenResult = await window.storage.get("hidden-presets");
        if (hiddenResult && hiddenResult.value) {
          setHiddenPresets(JSON.parse(hiddenResult.value));
        }
      } catch (err) {}
      try {
        const commitResult = await window.storage.get("weekly-commitment");
        if (commitResult && commitResult.value) {
          const parsed = JSON.parse(commitResult.value);
          setWeeklyCommitment(parsed.text || "");
          setCommitmentWeekStart(parsed.weekStart || "");
        }
      } catch (err) {}
      try {
        const goalSettingsResult = await window.storage.get("goal-settings");
        if (goalSettingsResult && goalSettingsResult.value) {
          const parsed = JSON.parse(goalSettingsResult.value);
          setGoalSettings((prev) => ({ ...prev, ...parsed }));
        }
      } catch (err) {}
      try {
        const scansResult = await window.storage.get("inbody-scans");
        if (scansResult && scansResult.value) {
          setInbodyScans(JSON.parse(scansResult.value));
        } else {
          const seed = [
            { id: "seed-2022-12-29", date: "2022-12-29", weight: 235.1, bodyFat: 27.4, skeletalMuscle: 97.9, bodyFatMass: 64.5, bmr: 2450 },
            { id: "seed-2023-01-16", date: "2023-01-16", weight: 235.8, bodyFat: 27.1, skeletalMuscle: 98.5, bodyFatMass: 63.8, bmr: 2466 },
            { id: "seed-2025-12-01", date: "2025-12-01", weight: 245.8, bodyFat: 23.7, skeletalMuscle: 108, bodyFatMass: 58.2, bmr: 2650 },
          ];
          setInbodyScans(seed);
        }
      } catch (err) {
        const seed = [
          { id: "seed-2022-12-29", date: "2022-12-29", weight: 235.1, bodyFat: 27.4, skeletalMuscle: 97.9, bodyFatMass: 64.5, bmr: 2450 },
          { id: "seed-2023-01-16", date: "2023-01-16", weight: 235.8, bodyFat: 27.1, skeletalMuscle: 98.5, bodyFatMass: 63.8, bmr: 2466 },
          { id: "seed-2025-12-01", date: "2025-12-01", weight: 245.8, bodyFat: 23.7, skeletalMuscle: 108, bodyFatMass: 58.2, bmr: 2650 },
        ];
        setInbodyScans(seed);
      }
      setLoading(false);
      hasLoadedRef.current = true;
    }
    loadAll();
  }, []);

  const hasLoadedRef = useRef(false);

  const goalSaveGuardRef = useRef(false);
  useEffect(() => {
    if (loading) return;
    if (!goalSaveGuardRef.current) {
      goalSaveGuardRef.current = true;
      return;
    }
    const t = setTimeout(() => {
      window.storage.set("goal-selection", String(goalIdx)).catch(() => {});
    }, 500);
    return () => clearTimeout(t);
  }, [goalIdx, loading]);

  const scansSaveGuardRef = useRef(false);
  useEffect(() => {
    if (loading) return;
    if (!scansSaveGuardRef.current) {
      scansSaveGuardRef.current = true;
      return;
    }
    const t = setTimeout(() => {
      window.storage.set("inbody-scans", JSON.stringify(inbodyScans)).catch(() => {});
    }, 500);
    return () => clearTimeout(t);
  }, [inbodyScans, loading]);

  const presetsSaveGuardRef = useRef(false);
  useEffect(() => {
    if (loading) return;
    if (!presetsSaveGuardRef.current) {
      presetsSaveGuardRef.current = true;
      return;
    }
    const t = setTimeout(() => {
      window.storage.set("custom-presets", JSON.stringify(customPresets)).catch(() => {});
    }, 500);
    return () => clearTimeout(t);
  }, [customPresets, loading]);

  const usageSaveGuardRef = useRef(false);
  useEffect(() => {
    if (loading) return;
    if (!usageSaveGuardRef.current) {
      usageSaveGuardRef.current = true;
      return;
    }
    const t = setTimeout(() => {
      window.storage.set("usage-counts", JSON.stringify(usageCounts)).catch(() => {});
    }, 800);
    return () => clearTimeout(t);
  }, [usageCounts, loading]);

  const [isLoadingDate, setIsLoadingDate] = useState(false);

  const saveInFlightRef = useRef(false);
  const pendingEntriesRef = useRef(null);

  const saveEntries = async (newEntries) => {
    if (saveInFlightRef.current) {
      pendingEntriesRef.current = newEntries;
      return;
    }
    saveInFlightRef.current = true;
    try {
      await window.storage.set(storageKey, JSON.stringify(newEntries));
      setSaveStatus("Saved");
      setTimeout(() => setSaveStatus(""), 1500);
      setSavedEntryIds(new Set(newEntries.map((e) => e.id)));
    } catch (err) {
      const msg = err ? (err.message || err.toString() || "unknown") : "no err";
      setSaveStatus(`Save failed: ${msg}`);
      setTimeout(() => setSaveStatus(""), 15000);
    } finally {
      saveInFlightRef.current = false;
      if (pendingEntriesRef.current !== null) {
        const next = pendingEntriesRef.current;
        pendingEntriesRef.current = null;
        saveEntries(next);
      }
    }
  };

  const updateEntries = (newEntries) => {
    setEntries(newEntries);
    saveEntries(newEntries);
  };

  useEffect(() => {
    if (activeTab !== "week" && activeTab !== "goal" && activeTab !== "why") return;
    async function loadWeek() {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = formatLocalDate(d);
        const key = `macros:${dateStr}`;
        let dayEntries = [];
        try {
          const result = await window.storage.get(key);
          if (result && result.value) {
            dayEntries = JSON.parse(result.value);
          }
        } catch (err) {}
        const cal = dayEntries.reduce((s, e) => s + e.cal, 0);
        const protein = dayEntries.reduce((s, e) => s + e.protein, 0);
        days.push({
          date: dateStr,
          dayName: d.toLocaleDateString("en-US", { weekday: "short" }),
          dayNum: d.getDate(),
          cal,
          protein,
          hasData: dayEntries.length > 0,
          isToday: i === 0,
        });
      }
      setWeeklyData(days);
    }
    loadWeek();
  }, [activeTab]);

  const totalCal = entries.reduce((sum, e) => sum + e.cal, 0);
  const totalProtein = entries.reduce((sum, e) => sum + e.protein, 0);
  const totalCarbs = entries.reduce((sum, e) => sum + (e.carbs || 0), 0);
  const totalFat = entries.reduce((sum, e) => sum + (e.fat || 0), 0);
  const calRemaining = activeGoal.cal - totalCal;
  const proteinRemaining = activeGoal.protein - totalProtein;
  const carbsRemaining = activeGoal.carbs - totalCarbs;
  const fatRemaining = activeGoal.fat - totalFat;

  const calPct = Math.min((totalCal / activeGoal.cal) * 100, 100);
  const proteinPct = Math.min((totalProtein / activeGoal.protein) * 100, 100);
  const carbsPct = Math.min((totalCarbs / activeGoal.carbs) * 100, 100);
  const fatPct = Math.min((totalFat / activeGoal.fat) * 100, 100);

  const calOver = totalCal > activeGoal.cal;
  const proteinHit = totalProtein >= activeGoal.protein;
  const carbsOver = totalCarbs > activeGoal.carbs;
  const fatOver = totalFat > activeGoal.fat;

  const getCoachTake = () => {
    if (selectedDate !== today) return null;
    const now = new Date();
    const hour = now.getHours();
    const calRemaining = activeGoal.cal - totalCal;
    const proteinRemaining = activeGoal.protein - totalProtein;

    let window = "morning";
    let mealsLeft = 3;
    if (hour >= 5 && hour < 11) { window = "morning"; mealsLeft = 3; }
    else if (hour >= 11 && hour < 14) { window = "midday"; mealsLeft = 2; }
    else if (hour >= 14 && hour < 17) { window = "afternoon"; mealsLeft = 2; }
    else if (hour >= 17 && hour < 21) { window = "evening"; mealsLeft = 1; }
    else { window = "late"; mealsLeft = 0; }

    if (entries.length === 0) {
      if (window === "morning") return { tone: "neutral", msg: `Start with breakfast — 4 eggs (400 cal, 24P) or a shake to kick off protein. ${activeGoal.protein}g target for the day.` };
      if (window === "midday") return { tone: "warn", msg: `No food logged yet and it's past lunch. Eat a full meal now — 10oz chicken, ½ cup rice, ½ avocado. Behind on protein.` };
      if (window === "afternoon") return { tone: "warn", msg: `Half the day gone, nothing logged. Log what you ate or eat now. ${activeGoal.protein}g protein is the floor.` };
      if (window === "evening") return { tone: "off", msg: `Nothing logged and it's dinner time. Either log retroactively or front-load protein now — shake + 10oz chicken minimum.` };
      return { tone: "off", msg: `Late with nothing logged. If you ate today, go back and log it. If you didn't, drink a shake now and own tomorrow.` };
    }

    if (proteinHit) {
      if (calRemaining < 0) return { tone: "warn", msg: `Protein locked in (${Math.round(totalProtein)}g ✓) but you're ${Math.abs(Math.round(calRemaining))} cal over. Stop eating. Water, tea, done.` };
      if (calRemaining < 200) return { tone: "good", msg: `Protein hit, ${calRemaining} cal left. Light snack only if hungry — berries, Greek yogurt, nothing heavy.` };
      return { tone: "good", msg: `Protein crushed (${Math.round(totalProtein)}g). ${calRemaining} cal in the bank. Use them on whatever you want within reason.` };
    }

    const proteinPerMealNeeded = mealsLeft > 0 ? Math.ceil(proteinRemaining / mealsLeft) : proteinRemaining;

    if (window === "morning") return { tone: "neutral", msg: `${Math.round(proteinRemaining)}g protein to go. Aim ~${proteinPerMealNeeded}g per remaining meal. Breakfast first — hit 24-30g now.` };
    if (window === "midday") {
      if (proteinRemaining > 140) return { tone: "warn", msg: `${Math.round(proteinRemaining)}g protein still needed and only 2 meals left. Lunch needs 10-12oz chicken minimum. No skipping dinner.` };
      return { tone: "neutral", msg: `${Math.round(proteinRemaining)}g protein to go across 2 meals. ~${proteinPerMealNeeded}g each. Lunch now: 10oz chicken + rice + avocado hits it.` };
    }
    if (window === "afternoon") return { tone: "neutral", msg: `${Math.round(proteinRemaining)}g protein remaining. Add a shake now (30g) + hit dinner hard (6-8oz protein minimum).` };
    if (window === "evening") {
      if (proteinRemaining > 60) return { tone: "warn", msg: `${Math.round(proteinRemaining)}g protein in one dinner is tough. Need 8-10oz protein + shake. Push it.` };
      if (proteinRemaining > 30) return { tone: "neutral", msg: `${Math.round(proteinRemaining)}g protein left. Dinner with 6oz protein + shake closes it out.` };
      return { tone: "neutral", msg: `${Math.round(proteinRemaining)}g protein to hit target. Shake or small chicken portion and you're done.` };
    }
    if (proteinRemaining > 30) return { tone: "warn", msg: `${Math.round(proteinRemaining)}g short with the day almost done. Shake now. Tomorrow start strong.` };
    return { tone: "neutral", msg: `Close but ${Math.round(proteinRemaining)}g short. One shake closes it.` };
  };

  const coachTake = getCoachTake();

  const openPortionModal = (meal) => {
    setPortionModal(meal);
    setPortionQty(meal.defaultQty);
  };

  const confirmPortion = () => {
    if (!portionModal) return;
    const qty = parseFloat(portionQty) || 0;
    if (qty <= 0) return;
    const displayQty = qty % 1 === 0 ? qty : qty;
    const newEntries = [
      ...entries,
      {
        name: `${displayQty} ${portionModal.unitLabel} ${portionModal.name.toLowerCase()}`,
        cal: Math.round(portionModal.cal * qty),
        protein: Math.round(portionModal.protein * qty * 10) / 10,
        carbs: Math.round((portionModal.carbs || 0) * qty * 10) / 10,
        fat: Math.round((portionModal.fat || 0) * qty * 10) / 10,
        goal: activeGoal.name,
        id: Date.now(),
      },
    ];
    updateEntries(newEntries);
    const key = portionModal.name;
    setUsageCounts({ ...usageCounts, [key]: (usageCounts[key] || 0) + 1 });
    setPortionModal(null);
  };

  const addPreset = (meal) => {
    updateEntries([...entries, { ...meal, id: Date.now() }]);
  };

  const startMealBuilder = () => {
    setMealBuilder({ name: "", ingredients: [], notes: "" });
  };

  const addIngredientToBuilder = (meal, qty) => {
    if (!mealBuilder) return;
    setMealBuilder({
      ...mealBuilder,
      ingredients: [...mealBuilder.ingredients, { meal, qty, id: Date.now() }],
    });
  };

  const removeIngredientFromBuilder = (id) => {
    if (!mealBuilder) return;
    setMealBuilder({
      ...mealBuilder,
      ingredients: mealBuilder.ingredients.filter((i) => i.id !== id),
    });
  };

  const saveMeal = () => {
    if (!mealBuilder || !mealBuilder.name || mealBuilder.ingredients.length === 0) return;
    const totalCal = mealBuilder.ingredients.reduce((s, i) => s + i.meal.cal * i.qty, 0);
    const totalProtein = mealBuilder.ingredients.reduce((s, i) => s + i.meal.protein * i.qty, 0);
    const totalCarbs = mealBuilder.ingredients.reduce((s, i) => s + (i.meal.carbs || 0) * i.qty, 0);
    const totalFat = mealBuilder.ingredients.reduce((s, i) => s + (i.meal.fat || 0) * i.qty, 0);

    const newMeal = {
      name: mealBuilder.name,
      notes: (mealBuilder.notes || "").slice(0, NOTES_MAX),
      ingredients: mealBuilder.ingredients.map(i => ({
        name: i.meal.name,
        unitLabel: i.meal.unitLabel,
        qty: String(i.qty),
        // Preserve inline macros for custom ingredients
        ...(i.meal._isCustomIng ? { _cal: i.meal.cal, _protein: i.meal.protein, _carbs: i.meal.carbs || 0, _fat: i.meal.fat || 0 } : {}),
      })),
      cal: Math.round(totalCal),
      protein: Math.round(totalProtein * 10) / 10,
      carbs: Math.round(totalCarbs * 10) / 10,
      fat: Math.round(totalFat * 10) / 10,
      id: `meal-${Date.now()}`,
    };
    const updated = [...savedMeals, newMeal];
    setSavedMeals(updated);
    window.storage.set("saved-meals", JSON.stringify(updated)).catch(() => {});
    setMealBuilder(null);
    setBuilderShowCustomForm(false);
    setBuilderCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" });
  };

  const deleteMeal = (id) => {
    const updated = savedMeals.filter((m) => m.id !== id);
    setSavedMeals(updated);
    window.storage.set("saved-meals", JSON.stringify(updated)).catch(() => {});
  };

  const openEditMealModal = (meal) => {
    setEditMealShowPicker(false);
    setEditMealCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" });
    // Deep-clone so edits don't mutate live state
    setEditMealModal({
      ...meal,
      cal: String(meal.cal),
      protein: String(meal.protein),
      carbs: String(meal.carbs),
      fat: String(meal.fat),
      notes: meal.notes || "",
      // Clone ingredients with string qty for inputs
      ingredients: (meal.ingredients || []).map(i => ({ ...i, qty: String(i.qty) })),
    });
  };

  const updateMeal = () => {
    if (!editMealModal) return;
    // If it has ingredients, recalculate macros from them (unless it's a one-shot custom meal)
    let updatedMeal;
    if (editMealModal.ingredients && editMealModal.ingredients.length > 0 && !editMealModal.isOneShot) {
      // Find base preset macro data for each ingredient to recalculate
      const allPossibleIngredients = [...PRESET_MEALS, ...customPresets];
      let recalcCal = 0, recalcProtein = 0, recalcCarbs = 0, recalcFat = 0;
      const updatedIngredients = editMealModal.ingredients.map(ing => {
        const qty = parseFloat(ing.qty) || 0;
        if (ing._cal !== undefined) {
          // Custom inline ingredient — use embedded per-unit macros
          recalcCal += ing._cal * qty;
          recalcProtein += ing._protein * qty;
          recalcCarbs += (ing._carbs || 0) * qty;
          recalcFat += (ing._fat || 0) * qty;
        } else {
          const source = allPossibleIngredients.find(p => p.name === ing.name);
          if (source) {
            recalcCal += source.cal * qty;
            recalcProtein += source.protein * qty;
            recalcCarbs += (source.carbs || 0) * qty;
            recalcFat += (source.fat || 0) * qty;
          }
        }
        return { ...ing, qty };
      });
      updatedMeal = {
        ...editMealModal,
        ingredients: updatedIngredients,
        cal: Math.round(recalcCal),
        protein: Math.round(recalcProtein * 10) / 10,
        carbs: Math.round(recalcCarbs * 10) / 10,
        fat: Math.round(recalcFat * 10) / 10,
        notes: editMealModal.notes.slice(0, NOTES_MAX),
      };
    } else {
      // One-shot or manual — use the typed macro values directly
      updatedMeal = {
        ...editMealModal,
        cal: Math.round(parseFloat(editMealModal.cal) || 0),
        protein: Math.round((parseFloat(editMealModal.protein) || 0) * 10) / 10,
        carbs: Math.round((parseFloat(editMealModal.carbs) || 0) * 10) / 10,
        fat: Math.round((parseFloat(editMealModal.fat) || 0) * 10) / 10,
        notes: editMealModal.notes.slice(0, NOTES_MAX),
      };
    }
    const updated = savedMeals.map(m => m.id === updatedMeal.id ? updatedMeal : m);
    setSavedMeals(updated);
    window.storage.set("saved-meals", JSON.stringify(updated)).catch(() => {});
    setEditMealModal(null);
  };

  const openMealScaleModal = (meal) => {
    setMealScaleModal(meal);
    setMealScale(1);
  };

  const confirmMealLog = () => {
    if (!mealScaleModal) return;
    const scale = parseFloat(mealScale) || 0;
    if (scale <= 0) return;
    updateEntries([
      ...entries,
      {
        name: scale === 1 ? mealScaleModal.name : `${scale}× ${mealScaleModal.name}`,
        cal: Math.round(mealScaleModal.cal * scale),
        protein: Math.round(mealScaleModal.protein * scale * 10) / 10,
        carbs: Math.round(mealScaleModal.carbs * scale * 10) / 10,
        fat: Math.round(mealScaleModal.fat * scale * 10) / 10,
        notes: mealScaleModal.notes || "",
        goal: activeGoal.name,
        id: Date.now(),
      },
    ]);
    const key = `meal:${mealScaleModal.name}`;
    setUsageCounts({ ...usageCounts, [key]: (usageCounts[key] || 0) + 1 });
    setMealScaleModal(null);
  };

  const addCustom = () => {
    if (!customName || !customCal) return;
    const newEntry = {
      name: customName,
      cal: parseFloat(customCal) || 0,
      protein: parseFloat(customProtein) || 0,
      carbs: parseFloat(customCarbs) || 0,
      fat: parseFloat(customFat) || 0,
      notes: customNotes.slice(0, NOTES_MAX),
      goal: activeGoal.name,
      id: Date.now(),
    };
    updateEntries([...entries, newEntry]);

    if (saveAsMeal) {
      const cal = parseFloat(customCal) || 0;
      const protein = parseFloat(customProtein) || 0;
      const carbs = parseFloat(customCarbs) || 0;
      const fat = parseFloat(customFat) || 0;
      const newMeal = {
        name: customName,
        notes: customNotes.slice(0, NOTES_MAX),
        ingredients: [],
        cal: Math.round(cal),
        protein: Math.round(protein * 10) / 10,
        carbs: Math.round(carbs * 10) / 10,
        fat: Math.round(fat * 10) / 10,
        isOneShot: true,
        id: `meal-${Date.now()}`,
      };
      const updatedMeals = [...savedMeals, newMeal];
      setSavedMeals(updatedMeals);
      setTimeout(() => {
        window.storage.set("saved-meals", JSON.stringify(updatedMeals)).catch(() => {});
      }, 200);
    }

    if (saveAsPreset) {
      const cal = parseFloat(customCal) || 0;
      const protein = parseFloat(customProtein) || 0;
      const carbs = parseFloat(customCarbs) || 0;
      const fat = parseFloat(customFat) || 0;

      let category = customCategory;
      if (customCategory === "auto") {
        const proteinCal = protein * 4;
        const carbsCal = carbs * 4;
        const fatCal = fat * 9;
        category = "Protein";
        if (proteinCal >= carbsCal && proteinCal >= fatCal) category = "Protein";
        else if (carbsCal >= proteinCal && carbsCal >= fatCal) category = "Carbs";
        else if (fatCal > proteinCal && fatCal > carbsCal) category = "Fats";
        if (protein === 0 && carbs === 0 && fat === 0 && cal > 0) category = "Alcohol";
      }

      const qty = parseFloat(customQty) || 1;
      const unit = customUnit.trim() || "serving";
      const unitLabel = unit.endsWith("s") || unit === "oz" ? unit : `${unit}s`;

      const newPreset = {
        name: customName,
        category,
        unit,
        unitLabel,
        cal: cal / qty,
        protein: protein / qty,
        carbs: carbs / qty,
        fat: fat / qty,
        defaultQty: qty,
        isCustom: true,
        id: `custom-${Date.now()}`,
      };
      const updatedPresets = [...customPresets, newPreset];
      setCustomPresets(updatedPresets);
    }

    setCustomName("");
    setCustomCal("");
    setCustomProtein("");
    setCustomCarbs("");
    setCustomFat("");
    setCustomNotes("");
    setCustomCategory("auto");
    setCustomUnit("oz");
    setCustomQty("");
    setSaveAsPreset(false);
    setSaveAsMeal(false);
  };

  const removeCustomPreset = (id) => {
    setCustomPresets(customPresets.filter((p) => p.id !== id));
  };

  const hidePreset = (name) => {
    if (!hiddenPresets.includes(name)) {
      const updated = [...hiddenPresets, name];
      setHiddenPresets(updated);
      window.storage.set("hidden-presets", JSON.stringify(updated)).catch(() => {});
    }
  };

  const restoreAllPresets = () => {
    setHiddenPresets([]);
    window.storage.set("hidden-presets", JSON.stringify([])).catch(() => {});
  };

  const openScanModal = () => {
    setScanModal({
      date: formatLocalDate(new Date()),
      weight: "",
      bodyFat: "",
      skeletalMuscle: "",
      bodyFatMass: "",
      bmr: "",
    });
  };

  const saveScan = () => {
    if (!scanModal || !scanModal.date || !scanModal.weight) return;
    const newScan = {
      id: `scan-${Date.now()}`,
      date: scanModal.date,
      weight: parseFloat(scanModal.weight) || 0,
      bodyFat: parseFloat(scanModal.bodyFat) || 0,
      skeletalMuscle: parseFloat(scanModal.skeletalMuscle) || 0,
      bodyFatMass: parseFloat(scanModal.bodyFatMass) || 0,
      bmr: parseFloat(scanModal.bmr) || 0,
    };
    const updated = [...inbodyScans, newScan].sort((a, b) => a.date.localeCompare(b.date));
    setInbodyScans(updated);
    setScanModal(null);
  };

  const deleteScan = (id) => {
    if (!confirm("Delete this scan? This can't be undone.")) return;
    setInbodyScans(inbodyScans.filter((s) => s.id !== id));
    if (compareScanId === id) setCompareScanId(null);
  };

  const analyzeScans = (latest, baseline) => {
    if (!latest || !baseline) return null;
    const d1 = new Date(baseline.date + "T00:00:00");
    const d2 = new Date(latest.date + "T00:00:00");
    const days = Math.round((d2 - d1) / 86400000);
    const weeks = days / 7;

    const weightDelta = latest.weight - baseline.weight;
    const bfDelta = latest.bodyFat - baseline.bodyFat;
    const smmDelta = latest.skeletalMuscle - baseline.skeletalMuscle;
    const bfmDelta = latest.bodyFatMass - baseline.bodyFatMass;
    const bmrDelta = latest.bmr - baseline.bmr;
    const weeklyWeightRate = weeks > 0 ? weightDelta / weeks : 0;

    let fatLossRatio = null;
    if (weightDelta < 0 && bfmDelta < 0) fatLossRatio = (bfmDelta / weightDelta) * 100;

    const takes = [];
    if (days < 1) {
      takes.push("Same-day scan — no meaningful comparison.");
    } else if (weightDelta < 0) {
      if (smmDelta >= -0.5) {
        takes.push(`Lost ${Math.abs(weightDelta).toFixed(1)} lbs over ${weeks.toFixed(1)} weeks (${weeklyWeightRate.toFixed(2)} lbs/week avg).`);
        if (bfmDelta < 0) {
          const fatPct = fatLossRatio ? fatLossRatio.toFixed(0) : "—";
          takes.push(`${Math.abs(bfmDelta).toFixed(1)} lbs of that was fat (${fatPct}% of total loss). Muscle preserved — this is exactly what you want.`);
        }
      } else if (smmDelta < -1) {
        takes.push(`⚠️ Lost ${Math.abs(smmDelta).toFixed(1)} lbs of muscle. Check protein intake and lifting intensity.`);
      } else {
        takes.push(`Lost ${Math.abs(weightDelta).toFixed(1)} lbs. Minor muscle loss (${Math.abs(smmDelta).toFixed(1)} lbs) — watch it.`);
      }
    } else if (weightDelta > 0) {
      if (smmDelta > 0 && bfDelta <= 0) {
        takes.push(`Recomposition: +${weightDelta.toFixed(1)} lbs weight, +${smmDelta.toFixed(1)} lbs muscle, body fat % dropped ${Math.abs(bfDelta).toFixed(1)}%. Got bigger AND leaner.`);
      } else if (smmDelta > bfmDelta) {
        takes.push(`Gained ${weightDelta.toFixed(1)} lbs — ${smmDelta.toFixed(1)} lbs muscle, ${bfmDelta.toFixed(1)} lbs fat. Lean gain.`);
      } else {
        takes.push(`Gained ${weightDelta.toFixed(1)} lbs — mostly fat (${bfmDelta.toFixed(1)} lbs fat, ${smmDelta.toFixed(1)} lbs muscle).`);
      }
    } else {
      takes.push("Weight unchanged — check muscle and fat deltas for recomposition.");
    }

    if (bmrDelta > 0) takes.push(`BMR up ${bmrDelta.toFixed(0)} cal/day (muscle drives this).`);
    else if (bmrDelta < -50) takes.push(`BMR down ${Math.abs(bmrDelta).toFixed(0)} cal/day — metabolism dropped with muscle.`);

    return { days, weeks, weightDelta, bfDelta, smmDelta, bfmDelta, bmrDelta, weeklyWeightRate, fatLossRatio, takes };
  };

  const exportToCSV = async () => {
    try {
      const rows = [["Date", "Meal", "Calories", "Protein (g)", "Carbs (g)", "Fat (g)", "Goal", "Notes"]];
      let allDaysData = [];
      try {
        const listResult = await window.storage.list("macros:");
        if (listResult && listResult.keys && listResult.keys.length > 0) {
          const sortedKeys = [...listResult.keys].sort();
          for (const key of sortedKeys) {
            const date = key.replace("macros:", "");
            try {
              const result = await window.storage.get(key);
              if (result && result.value) {
                const dayEntries = JSON.parse(result.value);
                for (const entry of dayEntries) allDaysData.push({ date, entry });
              }
            } catch (err) {}
          }
        }
      } catch (err) {}

      if (allDaysData.length === 0 && entries.length > 0) {
        for (const entry of entries) allDaysData.push({ date: today, entry });
      }
      if (allDaysData.length === 0) { alert("No data to export yet. Log some meals first."); return; }

      for (const { date, entry } of allDaysData) {
        rows.push([date, entry.name || "", Math.round(entry.cal || 0), entry.protein || 0, entry.carbs || 0, entry.fat || 0, entry.goal || "", entry.notes || ""]);
      }

      const csv = rows.map((row) => row.map((cell) => { const str = String(cell); return (str.includes(",") || str.includes('"') || str.includes("\n")) ? `"${str.replace(/"/g, '""')}"` : str; }).join(",")).join("\n");

      try {
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `macro-tracker-${today}.csv`;
        link.style.display = "none";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 100);
      } catch (downloadErr) {}
    } catch (err) {
      alert("Export failed: " + (err.message || "unknown error"));
    }
  };

  const removeEntry = (id) => {
    updateEntries(entries.filter((e) => e.id !== id));
  };

  const saveCommitment = (text) => {
    const d = new Date();
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(d.setDate(diff));
    const weekStart = formatLocalDate(monday);
    setWeeklyCommitment(text);
    setCommitmentWeekStart(weekStart);
    window.storage.set("weekly-commitment", JSON.stringify({ text, weekStart })).catch(() => {});
  };

  const resetDay = () => { updateEntries([]); };

  const saveGoalSettings = (newSettings) => {
    setGoalSettings(newSettings);
    window.storage.set("goal-settings", JSON.stringify(newSettings)).catch(() => {});
    setShowGoalEditModal(false);
  };

  if (loading) {
    return (
      <div className="min-h-screen bg-stone-50 flex items-center justify-center">
        <p className="text-stone-500">Loading today's log...</p>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-stone-50 p-4 pb-24">
      {showMantra && (
        <div className="fixed inset-0 bg-stone-900 flex items-center justify-center z-[100] p-8 cursor-pointer" onClick={() => setShowMantra(false)}>
          <div className="max-w-lg text-center">
            <p className="text-[10px] font-semibold uppercase tracking-[0.2em] text-stone-500 mb-8">Before you log anything</p>
            <p className="text-2xl sm:text-3xl text-white leading-relaxed font-light mb-10">
              I look in the mirror and I'm proud of who I am and how I look.
              <br /><br />
              I am a magnetic man — in body, mind, and presence.
              <br /><br />
              Every meal is a choice, and I make the choice that builds the man I'm becoming.
              <br /><br />
              <span className="font-semibold">I don't negotiate with my goals. I honor them.</span>
            </p>
            <p className="text-xs text-stone-500 uppercase tracking-wider">Tap anywhere to continue</p>
          </div>
        </div>
      )}

      <div className="max-w-md mx-auto">
        {/* Header */}
        <div className="mb-4">
          <div className="flex items-center justify-between mb-1">
            <h1 className="text-2xl font-bold text-stone-900">Macro Tracker</h1>
            <div className="flex items-center gap-2">
              {saveStatus && !saveStatus.startsWith("Save failed") && (
                <span className="text-xs text-stone-500 flex items-center gap-1">
                  <Check className="w-3 h-3" /> {saveStatus}
                </span>
              )}
              <button onClick={exportToCSV} className="flex items-center gap-1 px-2.5 py-1.5 bg-white rounded-lg border border-stone-200 text-xs font-medium text-stone-700 hover:bg-stone-50 active:bg-stone-100 shadow-sm" title="Export all data to CSV">
                <Download className="w-3.5 h-3.5" /> Export
              </button>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => shiftDate(-1)} className="p-1.5 bg-white border border-stone-200 rounded-lg text-stone-600 hover:bg-stone-50 active:bg-stone-100">
              <ChevronLeft className="w-4 h-4" />
            </button>
            <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="text-sm text-stone-700 bg-white border border-stone-200 rounded-lg px-2 py-1 focus:outline-none focus:border-stone-400" />
            <button onClick={() => shiftDate(1)} className="p-1.5 bg-white border border-stone-200 rounded-lg text-stone-600 hover:bg-stone-50 active:bg-stone-100">
              <ChevronRight className="w-4 h-4" />
            </button>
            {selectedDate !== today && (
              <button onClick={() => setSelectedDate(today)} className="text-xs text-stone-500 hover:text-stone-700 underline">Today</button>
            )}
          </div>
          <p className="text-[11px] text-stone-400 mt-1">{new Date(selectedDate + "T00:00:00").toLocaleDateString("en-US", { weekday: "long" })}</p>
        </div>

        {saveStatus && saveStatus.startsWith("Save failed") && (
          <div className="mb-4 bg-red-50 border border-red-200 rounded-xl p-3">
            <p className="text-xs font-semibold text-red-900 mb-1">⚠️ Logs not saving</p>
            <p className="text-xs text-red-800 break-words">{saveStatus}</p>
            <p className="text-[11px] text-red-700 mt-2">Check browser console (F12) for full details. Try refreshing the artifact.</p>
          </div>
        )}

        {/* Tab Navigation */}
        <div className="flex gap-1 mb-6 bg-white rounded-xl p-1 shadow-sm border border-stone-200">
          {[
            { id: "why", icon: Heart, label: "Why" },
            { id: "today", icon: Calendar, label: selectedDate === today ? "Today" : new Date(selectedDate + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) },
            { id: "week", icon: TrendingUp, label: "Week" },
            { id: "body", icon: Scale, label: "Body" },
            { id: "goal", icon: Target, label: "Goal" },
          ].map(({ id, icon: Icon, label }) => (
            <button key={id} onClick={() => setActiveTab(id)}
              className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs font-medium transition-colors ${activeTab === id ? "bg-stone-900 text-white" : "text-stone-600 hover:bg-stone-50"}`}>
              <Icon className="w-3.5 h-3.5" /> {label}
            </button>
          ))}
        </div>

        {activeTab === "today" && (
          <div>
            {streakCount > 0 && (
              <div className="bg-gradient-to-r from-orange-500 to-amber-500 rounded-2xl p-4 mb-4 text-white shadow-sm">
                <div className="flex items-center justify-between">
                  <div>
                    <p className="text-[10px] font-semibold uppercase tracking-wider opacity-90">Protein Streak</p>
                    <p className="text-2xl font-bold">{streakCount} day{streakCount === 1 ? "" : "s"} 🔥</p>
                  </div>
                  <p className="text-xs opacity-90 text-right max-w-[40%]">Don't break the chain. One shake if you have to.</p>
                </div>
              </div>
            )}

            {/* Progress Cards */}
            <div className="space-y-3 mb-6">
              <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
                <div className="flex justify-between items-baseline mb-2">
                  <span className="text-sm font-medium text-stone-600">Calories</span>
                  <span className={`text-xs font-medium ${calOver ? "text-red-600" : "text-stone-500"}`}>
                    {calOver ? `${Math.abs(calRemaining)} over` : `${calRemaining} left`}
                  </span>
                </div>
                <div className="flex items-baseline gap-1 mb-2">
                  <span className={`text-2xl font-bold ${calOver ? "text-red-600" : "text-stone-900"}`}>{Math.round(totalCal)}</span>
                  <span className="text-sm text-stone-400">/ {activeGoal.cal}</span>
                </div>
                <div className="h-2 bg-stone-100 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all ${calOver ? "bg-red-500" : "bg-stone-900"}`} style={{ width: `${calPct}%` }} />
                </div>
              </div>

              <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
                <div className="flex justify-between items-baseline mb-2">
                  <span className="text-sm font-medium text-stone-600">Protein</span>
                  <span className={`text-xs font-medium ${proteinHit ? "text-emerald-600" : "text-stone-500"}`}>

                  </span>
                </div>
                <div className="flex items-baseline gap-1 mb-2">
                  <span className={`text-2xl font-bold ${proteinHit ? "text-emerald-600" : "text-stone-900"}`}>{Math.round(totalProtein)}g</span>
                  <span className="text-sm text-stone-400">/ {activeGoal.protein}g</span>
                </div>
                <div className="h-2 bg-stone-100 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full transition-all ${proteinHit ? "bg-emerald-500" : "bg-stone-900"}`} style={{ width: `${proteinPct}%` }} />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div className="bg-white rounded-2xl p-3 shadow-sm border border-stone-200">
                  <div className="flex justify-between items-baseline mb-1">
                    <span className="text-xs font-medium text-stone-600">Carbs</span>
                    <span className={`text-[10px] font-medium ${carbsOver ? "text-red-600" : "text-stone-400"}`}>
                      {carbsOver ? `${Math.round(Math.abs(carbsRemaining))}g over` : `${Math.round(carbsRemaining)}g left`}
                    </span>
                  </div>
                  <div className="flex items-baseline gap-1 mb-1">
                    <span className={`text-lg font-bold ${carbsOver ? "text-red-600" : "text-stone-900"}`}>{Math.round(totalCarbs)}g</span>
                    <span className="text-xs text-stone-400">/ {activeGoal.carbs}g</span>
                  </div>
                  <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full ${carbsOver ? "bg-red-500" : "bg-amber-500"}`} style={{ width: `${carbsPct}%` }} />
                  </div>
                </div>
                <div className="bg-white rounded-2xl p-3 shadow-sm border border-stone-200">
                  <div className="flex justify-between items-baseline mb-1">
                    <span className="text-xs font-medium text-stone-600">Fat</span>
                    <span className={`text-[10px] font-medium ${fatOver ? "text-red-600" : "text-stone-400"}`}>
                      {fatOver ? `${Math.round(Math.abs(fatRemaining))}g over` : `${Math.round(fatRemaining)}g left`}
                    </span>
                  </div>
                  <div className="flex items-baseline gap-1 mb-1">
                    <span className={`text-lg font-bold ${fatOver ? "text-red-600" : "text-stone-900"}`}>{Math.round(totalFat)}g</span>
                    <span className="text-xs text-stone-400">/ {activeGoal.fat}g</span>
                  </div>
                  <div className="h-1.5 bg-stone-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full ${fatOver ? "bg-red-500" : "bg-sky-500"}`} style={{ width: `${fatPct}%` }} />
                  </div>
                </div>
              </div>
            </div>

            {/* Coach's Take */}
            {coachTake && (
              <div className={`rounded-2xl p-4 mb-6 border-2 ${
                coachTake.tone === "good" ? "bg-emerald-50 border-emerald-200" :
                coachTake.tone === "warn" ? "bg-amber-50 border-amber-200" :
                coachTake.tone === "off" ? "bg-red-50 border-red-200" :
                "bg-stone-900 border-stone-900 text-white"
              }`}>
                <p className={`text-[10px] font-semibold uppercase tracking-wider mb-1.5 ${
                  coachTake.tone === "good" ? "text-emerald-700" :
                  coachTake.tone === "warn" ? "text-amber-700" :
                  coachTake.tone === "off" ? "text-red-700" :
                  "text-stone-400"
                }`}>Coach's Take</p>
                <p className={`text-sm leading-relaxed ${coachTake.tone === "neutral" ? "text-white" : "text-stone-900"}`}>
                  {coachTake.msg}
                </p>
              </div>
            )}

            {/* Today's Log */}
            {entries.length > 0 && (
              <div className="mb-6">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide">Today's Log</h2>
                  <button onClick={resetDay} className="text-xs text-stone-400 hover:text-stone-600 flex items-center gap-1">
                    <RotateCcw className="w-3 h-3" /> Clear
                  </button>
                </div>
                <div className="space-y-2">
                  {entries.map((entry) => {
                    const isSaved = savedEntryIds.has(entry.id);
                    return (
                      <div key={entry.id} className="bg-white rounded-xl p-3 shadow-sm border border-stone-200 flex items-start justify-between">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap">
                            <p className="text-sm font-medium text-stone-900">{entry.name}</p>
                            {isSaved ? (
                              <span className="text-[10px] text-emerald-600 flex items-center gap-0.5 flex-shrink-0">
                                <Check className="w-3 h-3" /> Saved
                              </span>
                            ) : (
                              <span className="text-[10px] text-amber-600 flex-shrink-0">Unsaved</span>
                            )}
                          </div>
                          <p className="text-xs text-stone-500 mt-0.5">
                            {Math.round(entry.cal)} cal · {entry.protein}P · {entry.carbs || 0}C · {entry.fat || 0}F
                          </p>
                          {/* ✅ Full notes — no truncation */}
                          {entry.notes && (
                            <p className="text-xs text-stone-400 italic mt-1 leading-relaxed">
                              {entry.notes}
                            </p>
                          )}
                        </div>
                        <button onClick={() => removeEntry(entry.id)} className="ml-3 p-2 text-stone-400 hover:text-red-500 rounded-lg hover:bg-stone-50 flex-shrink-0">
                          <Trash2 className="w-4 h-4" />
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Saved Meals */}
            <div className="mb-6">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide">Saved Meals</h2>
                <button onClick={startMealBuilder} className="text-xs font-medium text-stone-600 bg-white px-3 py-1.5 rounded-lg border border-stone-200 hover:bg-stone-50 flex items-center gap-1">
                  <Plus className="w-3 h-3" /> Build Meal
                </button>
              </div>
              {savedMeals.length === 0 ? (
                <div className="bg-white rounded-xl p-4 border border-stone-200 border-dashed">
                  <p className="text-xs text-stone-400 text-center">Combine ingredients into meals you eat often</p>
                </div>
              ) : (
                <div className="space-y-2">
                  {[...savedMeals]
                    .sort((a, b) => (usageCounts[`meal:${b.name}`] || 0) - (usageCounts[`meal:${a.name}`] || 0))
                    .map((meal) => {
                      const useCount = usageCounts[`meal:${meal.name}`] || 0;
                      return (
                        <div key={meal.id} className="w-full bg-white rounded-xl p-3 shadow-sm border border-stone-200 flex items-center justify-between">
                          <button onClick={() => openMealScaleModal(meal)} className="flex-1 min-w-0 text-left hover:opacity-70">
                            <div className="flex items-center gap-2">
                              <p className="text-sm font-semibold text-stone-900 truncate">{meal.name}</p>
                              {useCount >= 3 && (
                                <span className="text-[10px] bg-stone-100 text-stone-600 px-1.5 py-0.5 rounded-full flex-shrink-0">{useCount}×</span>
                              )}
                            </div>
                            <p className="text-xs text-stone-500 mt-0.5">
                              {meal.cal} cal · {meal.protein}P · {meal.carbs}C · {meal.fat}F
                            </p>
                            {/* ✅ Ingredients shown on card face, notes hidden until modal */}
                            {meal.ingredients && meal.ingredients.length > 0 && (
                              <p className="text-[10px] text-stone-400 mt-0.5 truncate">
                                {meal.ingredients.map(i => `${i.qty} ${i.unitLabel} ${i.name.toLowerCase()}`).join(" + ")}
                              </p>
                            )}
                          </button>
                          <button onClick={(e) => { e.stopPropagation(); openEditMealModal(meal); }} className="ml-1 p-2 text-stone-400 hover:text-stone-700 rounded-lg hover:bg-stone-50" title="Edit meal">
                            <Pencil className="w-3.5 h-3.5" />
                          </button>
                          <button onClick={() => deleteMeal(meal.id)} className="ml-1 p-2 text-stone-400 hover:text-red-500 rounded-lg hover:bg-stone-50">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        </div>
                      );
                    })}
                </div>
              )}
            </div>

            {/* Quick Add Presets */}
            <div className="mb-6">
              <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-3">Quick Add</h2>
              {CATEGORY_ORDER.map((category) => {
                const builtInMeals = PRESET_MEALS.filter((m) => m.category === category).filter((m) => !hiddenPresets.includes(m.name));
                const customMeals = customPresets.filter((m) => m.category === category);
                const allMeals = [...builtInMeals, ...customMeals].sort((a, b) => (usageCounts[b.name] || 0) - (usageCounts[a.name] || 0));
                if (allMeals.length === 0) return null;
                return (
                  <div key={category} className="mb-4">
                    <h3 className="text-[10px] font-semibold text-stone-400 uppercase tracking-wider mb-2 px-1">{category}</h3>
                    <div className="space-y-2">
                      {allMeals.map((meal, idx) => {
                        const defaultCal = Math.round(meal.cal * meal.defaultQty);
                        const defaultProtein = Math.round(meal.protein * meal.defaultQty * 10) / 10;
                        const defaultCarbs = Math.round((meal.carbs || 0) * meal.defaultQty * 10) / 10;
                        const defaultFat = Math.round((meal.fat || 0) * meal.defaultQty * 10) / 10;
                        const useCount = usageCounts[meal.name] || 0;
                        const displayName = meal.isCustom ? meal.name : `${meal.defaultQty} ${meal.unitLabel} ${meal.name.toLowerCase()}`;
                        return (
                          <div key={meal.id || idx} className="w-full bg-white rounded-xl p-3 shadow-sm border border-stone-200 flex items-center justify-between">
                            <button onClick={() => openPortionModal(meal)} className="flex-1 min-w-0 text-left hover:opacity-70">
                              <div className="flex items-center gap-2">
                                <p className="text-sm font-medium text-stone-900 truncate">{displayName}</p>
                                {meal.isCustom && <span className="text-[9px] bg-stone-900 text-white px-1.5 py-0.5 rounded-full flex-shrink-0">Custom</span>}
                                {useCount >= 3 && <span className="text-[10px] bg-stone-100 text-stone-600 px-1.5 py-0.5 rounded-full flex-shrink-0">{useCount}×</span>}
                              </div>
                              <p className="text-xs text-stone-500">{defaultCal} cal · {defaultProtein}P · {defaultCarbs}C · {defaultFat}F</p>
                            </button>
                            <button onClick={() => meal.isCustom ? removeCustomPreset(meal.id) : hidePreset(meal.name)} className="ml-2 p-2 text-stone-400 hover:text-red-500 rounded-lg hover:bg-stone-50">
                              <Trash2 className="w-4 h-4" />
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              {hiddenPresets.length > 0 && (
                <button onClick={restoreAllPresets} className="text-xs text-stone-500 hover:text-stone-700 underline mt-2">
                  Restore {hiddenPresets.length} hidden item{hiddenPresets.length > 1 ? "s" : ""}
                </button>
              )}
            </div>

            {/* Custom Entry */}
            <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
              <h2 className="text-sm font-semibold text-stone-700 uppercase tracking-wide mb-3">Custom Entry</h2>
              <div className="space-y-2">
                <input type="text" placeholder="Food name" value={customName} onChange={(e) => setCustomName(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                <div className="flex gap-2">
                  <input type="number" placeholder="Qty (e.g., 6)" value={customQty} onChange={(e) => setCustomQty(e.target.value)} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                  <select value={customUnit} onChange={(e) => setCustomUnit(e.target.value)} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400 bg-white">
                    <option value="oz">oz</option>
                    <option value="g">g</option>
                    <option value="cup">cup</option>
                    <option value="tbsp">tbsp</option>
                    <option value="tsp">tsp</option>
                    <option value="piece">piece</option>
                    <option value="slice">slice</option>
                    <option value="serving">serving</option>
                    <option value="drink">drink</option>
                    <option value="shake">shake</option>
                  </select>
                </div>
                <div className="flex gap-2">
                  <input type="number" placeholder="Calories" value={customCal} onChange={(e) => setCustomCal(e.target.value)} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                  <input type="number" placeholder="Protein (g)" value={customProtein} onChange={(e) => setCustomProtein(e.target.value)} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                </div>
                <div className="flex gap-2">
                  <input type="number" placeholder="Carbs (g)" value={customCarbs} onChange={(e) => setCustomCarbs(e.target.value)} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                  <input type="number" placeholder="Fat (g)" value={customFat} onChange={(e) => setCustomFat(e.target.value)} className="flex-1 min-w-0 px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400" />
                </div>
                {/* ✅ Notes with 200-char limit and counter */}
                <div>
                  <textarea
                    placeholder="Notes (optional) — portions, prep method, restaurant, etc."
                    value={customNotes}
                    onChange={(e) => setCustomNotes(e.target.value.slice(0, NOTES_MAX))}
                    rows={2}
                    maxLength={NOTES_MAX}
                    className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400 resize-none"
                  />
                  {customNotes.length > 0 && (
                    <p className={`text-[10px] text-right mt-0.5 ${customNotes.length >= NOTES_MAX ? "text-red-500" : "text-stone-400"}`}>
                      {customNotes.length}/{NOTES_MAX}
                    </p>
                  )}
                </div>
                <label className="flex items-center gap-2 cursor-pointer py-1">
                  <input type="checkbox" checked={saveAsPreset} onChange={(e) => setSaveAsPreset(e.target.checked)} className="w-4 h-4 rounded border-stone-300 text-stone-900 focus:ring-stone-500" />
                  <span className="text-sm text-stone-700">Save as individual quick add</span>
                </label>
                {saveAsPreset && (
                  <div className="pl-6">
                    <label className="text-xs text-stone-500 mb-1 block">Category</label>
                    <select value={customCategory} onChange={(e) => setCustomCategory(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-stone-200 text-base focus:outline-none focus:border-stone-400 bg-white">
                      <option value="auto">Auto-detect</option>
                      <option value="Protein">Protein</option>
                      <option value="Carbs">Carbs</option>
                      <option value="Fats">Fats</option>
                      <option value="Drinks">Drinks</option>
                      <option value="Alcohol">Alcohol</option>
                    </select>
                  </div>
                )}
                <label className="flex items-center gap-2 cursor-pointer py-1">
                  <input type="checkbox" checked={saveAsMeal} onChange={(e) => setSaveAsMeal(e.target.checked)} className="w-4 h-4 rounded border-stone-300 text-stone-900 focus:ring-stone-500" />
                  <span className="text-sm text-stone-700">Save as meal quick add</span>
                </label>
                <button onClick={addCustom} disabled={!customName || !customCal} className="w-full bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium disabled:bg-stone-300 disabled:cursor-not-allowed hover:bg-stone-800 transition-colors">
                  Add Entry
                </button>
              </div>
            </div>
          </div>
        )}

        {activeTab === "week" && <WeekView weeklyData={weeklyData} activeGoal={activeGoal} />}

        {activeTab === "body" && (() => {
          const sorted = [...inbodyScans].sort((a, b) => a.date.localeCompare(b.date));
          const latest = sorted[sorted.length - 1] || null;
          const earlierScans = sorted.slice(0, -1);
          let baseline = null;
          if (compareScanId) baseline = sorted.find((s) => s.id === compareScanId) || null;
          if (!baseline && earlierScans.length > 0) baseline = earlierScans[earlierScans.length - 1];
          const analysis = analyzeScans(latest, baseline);

          const fmtDate = (d) => new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
          const fmtDelta = (n, decimals = 1, suffix = "") => { const sign = n > 0 ? "+" : ""; return `${sign}${n.toFixed(decimals)}${suffix}`; };
          const deltaColor = (n, goodWhenNegative = false) => {
            if (Math.abs(n) < 0.05) return "text-stone-500";
            const isGood = goodWhenNegative ? n < 0 : n > 0;
            return isGood ? "text-emerald-600" : "text-red-600";
          };

          return (
            <div className="space-y-4">
              {!latest && (
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-stone-200 text-center">
                  <p className="text-sm text-stone-600 mb-3">No InBody scans yet.</p>
                  <button onClick={openScanModal} className="bg-stone-900 text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-stone-800">Add your first scan</button>
                </div>
              )}
              {latest && (
                <>
                  <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
                    <div className="flex items-center justify-between mb-3">
                      <div>
                        <p className="text-xs text-stone-500 uppercase tracking-wide">Latest Scan</p>
                        <p className="text-sm font-semibold text-stone-900">{fmtDate(latest.date)}</p>
                      </div>
                      <button onClick={openScanModal} className="flex items-center gap-1 bg-stone-900 text-white rounded-lg px-3 py-1.5 text-xs font-medium hover:bg-stone-800">
                        <Plus className="w-3 h-3" /> Add Scan
                      </button>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="bg-stone-50 rounded-lg p-3"><p className="text-xs text-stone-500">Weight</p><p className="text-xl font-bold text-stone-900">{latest.weight} <span className="text-xs font-normal text-stone-500">lbs</span></p></div>
                      <div className="bg-stone-50 rounded-lg p-3"><p className="text-xs text-stone-500">Body Fat</p><p className="text-xl font-bold text-stone-900">{latest.bodyFat}<span className="text-xs font-normal text-stone-500">%</span></p></div>
                      <div className="bg-stone-50 rounded-lg p-3"><p className="text-xs text-stone-500">Muscle Mass</p><p className="text-xl font-bold text-stone-900">{latest.skeletalMuscle} <span className="text-xs font-normal text-stone-500">lbs</span></p></div>
                      <div className="bg-stone-50 rounded-lg p-3"><p className="text-xs text-stone-500">Fat Mass</p><p className="text-xl font-bold text-stone-900">{latest.bodyFatMass} <span className="text-xs font-normal text-stone-500">lbs</span></p></div>
                      <div className="bg-stone-50 rounded-lg p-3 col-span-2"><p className="text-xs text-stone-500">Metabolic Rate</p><p className="text-xl font-bold text-stone-900">{latest.bmr} <span className="text-xs font-normal text-stone-500">cal/day</span></p></div>
                    </div>
                  </div>
                  {baseline && analysis && (
                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
                      <div className="flex items-center justify-between mb-3">
                        <p className="text-xs text-stone-500 uppercase tracking-wide font-semibold">Comparison</p>
                        {earlierScans.length > 1 && (
                          <select value={compareScanId || baseline.id} onChange={(e) => setCompareScanId(e.target.value)} className="text-xs px-2 py-1 rounded border border-stone-200 bg-white">
                            {earlierScans.map((s) => (<option key={s.id} value={s.id}>vs {fmtDate(s.date)}</option>))}
                          </select>
                        )}
                      </div>
                      <p className="text-xs text-stone-500 mb-3">{fmtDate(baseline.date)} → {fmtDate(latest.date)} · {analysis.days} days ({analysis.weeks.toFixed(1)} weeks)</p>
                      <div className="space-y-2">
                        {[
                          { label: "Weight", from: baseline.weight, to: latest.weight, delta: analysis.weightDelta, suffix: " lbs", goodWhenNeg: true },
                          { label: "Body Fat %", from: `${baseline.bodyFat}%`, to: `${latest.bodyFat}%`, delta: analysis.bfDelta, suffix: "%", goodWhenNeg: true },
                          { label: "Muscle Mass", from: baseline.skeletalMuscle, to: latest.skeletalMuscle, delta: analysis.smmDelta, suffix: " lbs", goodWhenNeg: false },
                          { label: "Fat Mass", from: baseline.bodyFatMass, to: latest.bodyFatMass, delta: analysis.bfmDelta, suffix: " lbs", goodWhenNeg: true },
                          { label: "BMR", from: baseline.bmr, to: latest.bmr, delta: analysis.bmrDelta, suffix: " cal", goodWhenNeg: false },
                        ].map(({ label, from, to, delta, suffix, goodWhenNeg }, i, arr) => (
                          <div key={label} className={`flex items-center justify-between py-1.5 ${i < arr.length - 1 ? "border-b border-stone-100" : ""}`}>
                            <span className="text-sm text-stone-600">{label}</span>
                            <div className="text-right">
                              <span className="text-sm text-stone-900">{from} → {to}</span>
                              <span className={`ml-2 text-sm font-semibold ${deltaColor(delta, goodWhenNeg)}`}>{fmtDelta(delta, label === "BMR" ? 0 : 1, suffix)}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  {analysis && analysis.takes.length > 0 && (
                    <div className="bg-stone-900 rounded-2xl p-4 text-white">
                      <p className="text-xs text-stone-400 uppercase tracking-wide font-semibold mb-2">Coach's Take</p>
                      <div className="space-y-1.5">{analysis.takes.map((t, i) => (<p key={i} className="text-sm leading-relaxed">{t}</p>))}</div>
                    </div>
                  )}
                  {sorted.length > 0 && (
                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-stone-200">
                      <p className="text-xs text-stone-500 uppercase tracking-wide font-semibold mb-3">History ({sorted.length})</p>
                      <div className="space-y-2">
                        {[...sorted].reverse().map((s) => (
                          <div key={s.id} className="flex items-center justify-between py-2 border-b border-stone-100 last:border-0">
                            <div>
                              <p className="text-sm font-semibold text-stone-900">{fmtDate(s.date)}</p>
                              <p className="text-xs text-stone-500">{s.weight} lbs · {s.bodyFat}% BF · {s.skeletalMuscle} lbs SMM</p>
                            </div>
                            <button onClick={() => deleteScan(s.id)} className="text-stone-400 hover:text-red-600 p-1"><Trash2 className="w-4 h-4" /></button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          );
        })()}

        {activeTab === "goal" && <GoalView goalIdx={goalIdx} setGoalIdx={setGoalIdx} weeklyData={weeklyData} activeGoal={activeGoal} />}
        {activeTab === "why" && <WhyView weeklyData={weeklyData} activeGoal={activeGoal} weeklyCommitment={weeklyCommitment} saveCommitment={saveCommitment} commitmentWeekStart={commitmentWeekStart} streakCount={streakCount} goalSettings={goalSettings} onEditGoal={() => setShowGoalEditModal(true)} />}
      </div>

      {/* Meal Builder Modal */}
      {mealBuilder && (

                      <p className="text-xs text-stone-500">{Math.round(ing.meal.cal * ing.qty)} cal · {Math.round(ing.meal.protein * ing.qty * 10) / 10}P</p>
                    </div>
                    <div className="flex items-center gap-1 ml-2">
                      <button onClick={() => setMealBuilder({ ...mealBuilder, ingredients: mealBuilder.ingredients.map(i => i.id === ing.id ? { ...i, qty: Math.max(0.25, Math.round((i.qty - 0.25) * 100) / 100) } : i) })} className="w-6 h-6 rounded bg-stone-200 text-stone-700 text-sm font-bold hover:bg-stone-300 flex items-center justify-center">−</button>
                      <span className="text-xs font-semibold text-stone-800 w-8 text-center">{ing.qty}</span>
                      <button onClick={() => setMealBuilder({ ...mealBuilder, ingredients: mealBuilder.ingredients.map(i => i.id === ing.id ? { ...i, qty: Math.round((i.qty + 0.25) * 100) / 100 } : i) })} className="w-6 h-6 rounded bg-stone-200 text-stone-700 text-sm font-bold hover:bg-stone-300 flex items-center justify-center">+</button>
                      <button onClick={() => removeIngredientFromBuilder(ing.id)} className="ml-1 p-1 text-stone-400 hover:text-red-500"><Trash2 className="w-4 h-4" /></button>
                    </div>
                  </div>

                <div className="pt-2 border-t border-stone-100">
                  <p className="text-xs text-stone-500">Total: <span className="font-semibold text-stone-900">{Math.round(mealBuilder.ingredients.reduce((s, i) => s + i.meal.cal * i.qty, 0))} cal · {Math.round(mealBuilder.ingredients.reduce((s, i) => s + i.meal.protein * i.qty, 0) * 10) / 10}P</span></p>
                </div>
              </div>
            )}

            <p className="text-xs font-semibold text-stone-600 uppercase tracking-wide mb-2">Add Ingredients</p>
            <div className="flex-1 overflow-y-auto mb-3 border border-stone-100 rounded-lg">
              <div className="space-y-0">
                {[...PRESET_MEALS.filter((m) => !hiddenPresets.includes(m.name)), ...customPresets].map((meal, idx) => (
                  <button key={meal.id || `builtin-${idx}`} onClick={() => { setIngredientPickerModal(meal); setIngredientPickerQty(meal.defaultQty); }} className="w-full text-left px-3 py-2 text-xs hover:bg-stone-50 border-b border-stone-100 last:border-0 flex items-center justify-between">
                    <span className="text-stone-700">{meal.defaultQty} {meal.unitLabel} {meal.name.toLowerCase()}{meal.isCustom && <span className="ml-1 text-stone-400">· custom</span>}</span>
                    <Plus className="w-3 h-3 text-stone-400" />
                  </button>
                ))}
                {/* Custom ingredient entry */}
                {!builderShowCustomForm ? (
                  <button
                    onClick={() => setBuilderShowCustomForm(true)}
                    className="w-full text-left px-3 py-2 text-xs hover:bg-stone-50 flex items-center justify-between text-stone-500 italic"
                  >
                    <span>+ Enter custom ingredient…</span>
                    <Plus className="w-3 h-3 text-stone-400" />
                  </button>
                ) : (
                  <div className="p-3 bg-stone-50 border-t border-stone-200 space-y-2">
                    <div className="flex items-center justify-between mb-1">
                      <p className="text-xs font-semibold text-stone-600">Custom Ingredient</p>
                      <button onClick={() => { setBuilderShowCustomForm(false); setBuilderCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" }); }} className="text-xs text-stone-400 hover:text-stone-600">✕</button>
                    </div>
                    <input
                      type="text"
                      placeholder="Name (e.g., Greek yogurt)"
                      value={builderCustomIng.name}
                      onChange={(e) => setBuilderCustomIng({ ...builderCustomIng, name: e.target.value })}
                      className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400"
                    />
                    <div className="flex gap-2">
                      <input type="number" placeholder="Qty" value={builderCustomIng.qty} onChange={(e) => setBuilderCustomIng({ ...builderCustomIng, qty: e.target.value })} className="w-16 px-2 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                      <select value={builderCustomIng.unit} onChange={(e) => setBuilderCustomIng({ ...builderCustomIng, unit: e.target.value })} className="flex-1 px-2 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400 bg-white">
                        <option value="oz">oz</option>
                        <option value="g">g</option>
                        <option value="cup">cup</option>
                        <option value="tbsp">tbsp</option>
                        <option value="tsp">tsp</option>
                        <option value="piece">piece</option>
                        <option value="slice">slice</option>
                        <option value="serving">serving</option>
                      </select>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <input type="number" placeholder="Calories" value={builderCustomIng.cal} onChange={(e) => setBuilderCustomIng({ ...builderCustomIng, cal: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                      <input type="number" placeholder="Protein (g)" value={builderCustomIng.protein} onChange={(e) => setBuilderCustomIng({ ...builderCustomIng, protein: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                      <input type="number" placeholder="Carbs (g)" value={builderCustomIng.carbs} onChange={(e) => setBuilderCustomIng({ ...builderCustomIng, carbs: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                      <input type="number" placeholder="Fat (g)" value={builderCustomIng.fat} onChange={(e) => setBuilderCustomIng({ ...builderCustomIng, fat: e.target.value })} className="w-full px-2.5 py-1.5 rounded-lg border border-stone-200 text-sm focus:outline-none focus:border-stone-400" />
                    </div>
                    <button
                      onClick={() => {

                        const qty = parseFloat(builderCustomIng.qty) || 1;
                        const unit = builderCustomIng.unit;
                        const unitLabel = unit.endsWith("s") || unit === "oz" ? unit : `${unit}s`;
                        const cal = parseFloat(builderCustomIng.cal) || 0;
                        const protein = parseFloat(builderCustomIng.protein) || 0;
                        const carbs = parseFloat(builderCustomIng.carbs) || 0;
                        const fat = parseFloat(builderCustomIng.fat) || 0;
                        // Build a synthetic "meal" object that addIngredientToBuilder can use
                        const syntheticMeal = {
                          name: builderCustomIng.name,
                          unitLabel,
                          unit,
                          cal: cal / qty,
                          protein: protein / qty,
                          carbs: carbs / qty,
                          fat: fat / qty,
                          defaultQty: qty,
                          _isCustomIng: true,
                        };
                        addIngredientToBuilder(syntheticMeal, qty);
                        setBuilderCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" });
                        setBuilderShowCustomForm(false);
                      }}
                      disabled={!builderCustomIng.name || !builderCustomIng.cal}
                      className="w-full bg-stone-900 text-white rounded-lg py-2 text-xs font-medium hover:bg-stone-800 disabled:bg-stone-300"
                    >
                      Add to Meal
                    </button>
                  </div>
                )}
              </div>
            </div>

            <div className="flex gap-2">
              <button onClick={() => { setMealBuilder(null); setBuilderShowCustomForm(false); setBuilderCustomIng({ name: "", cal: "", protein: "", carbs: "", fat: "", qty: "1", unit: "oz" }); }} className="flex-1 bg-stone-100 text-stone-700 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200">Cancel</button>
              <button onClick={saveMeal} disabled={!mealBuilder.name || mealBuilder.ingredients.length === 0} className="flex-1 bg-stone-900 text-white rounded-lg py-2.5 text-sm font-medium disabled:bg-stone-300 hover:bg-stone-800">Save Meal</button>
            </div>
          </div>
        </div>

      {/* Ingredient Portion Picker Modal */}
      {ingredientPickerModal && (
        <div className="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-[60] p-4" onClick={() => setIngredientPickerModal(null)}>

            <p className="text-xs text-stone-500 mb-4">Per {ingredientPickerModal.unit}: {Math.round(ingredientPickerModal.cal)} cal · {Math.round(ingredientPickerModal.protein * 10) / 10}P · {Math.round((ingredientPickerModal.carbs || 0) * 10) / 10}C · {Math.round((ingredientPickerModal.fat || 0) * 10) / 10}F</p>
